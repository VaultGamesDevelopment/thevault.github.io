<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Premium Arcade</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --accent-color: #00d4ff;
            --card-bg: #1a1a1a;
            --nav-bg: rgba(20, 20, 20, 0.8);
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-bg: #ffffff;
            --nav-bg: rgba(245, 245, 247, 0.8);
        }

        [data-theme="cyberpunk"] {
            --bg-color: #050505;
            --text-color: #00ff9f;
            --accent-color: #f20587;
            --card-bg: #0d0d0d;
            --nav-bg: rgba(5, 5, 5, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Weather Overlay Layer */
        #weather-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1; /* Behind UI, above BG */
        }

        .weather-item {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* Layout */
        header {
            position: sticky;
            top: 0;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-color);
        }

        main {
            position: relative;
            z-index: 2;
            padding: 2rem 5%;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            filter: grayscale(20%);
            transition: filter 0.3s;
        }

        .game-card:hover img {
            filter: grayscale(0%);
        }

        .game-info {
            padding: 15px;
        }

        .game-info h3 {
            margin: 0;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Settings Popup */
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--accent-color);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        /* Game Player View */
        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2001;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div id="weather-overlay"></div>

    <header>
        <div class="logo">The Vault</div>
        <button onclick="toggleSettings(true)">System Settings</button>
    </header>

    <main>
        <div class="game-grid" id="game-grid">
            </div>
    </main>

    <div id="game-view">
        <div class="controls">
            <button onclick="closeGame()">← Return to Vault</button>
        </div>
        <div id="iframe-container" style="width: 100%; height: 100%;"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="toggleSettings(false)"></div>
    <div id="settings-modal">
        <h2 style="margin-top: 0; color: var(--accent-color);">Control Panel</h2>
        
        <div class="setting-group">
            <label>Visual Interface</label>
            <div class="btn-grid">
                <button onclick="setTheme('dark')">Onyx</button>
                <button onclick="setTheme('light')">Polar</button>
                <button onclick="setTheme('cyberpunk')" style="grid-column: span 2;">Neon Protocol</button>
            </div>
        </div>

        <div class="setting-group">
            <label>Atmosphere Engine</label>
            <div class="btn-grid">
                <button onclick="setWeather('none')">Static</button>
                <button onclick="setWeather('rain')">Rain</button>
                <button onclick="setWeather('snow')">Snow</button>
                <button onclick="setWeather('mist')">Mist</button>
            </div>
        </div>

        <button style="width: 100%; margin-top: 20px; background: transparent; border: 1px solid #444;" onclick="toggleSettings(false)">Exit Terminal</button>
    </div>

    <script>
        const SID = "1";
        const FEED_URL = `https://feeds.gamepix.com/v2/json?order=quality&pagination=24&sid=${SID}`;

        async function initVault() {
            try {
                const response = await fetch(FEED_URL);
                const data = await response.json();
                const grid = document.getElementById('game-grid');
                
                grid.innerHTML = data.items.map(item => `
                    <div class="game-card" onclick="launchGame('${item.namespace}')">
                        <img src="${item.banner_image}" alt="${item.title}">
                        <div class="game-info">
                            <h3>${item.title}</h3>
                            <span style="font-size: 0.75rem; color: var(--accent-color)">${item.category.toUpperCase()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Vault access denied:", e);
            }
        }

        function launchGame(ns) {
            const view = document.getElementById('game-view');
            const container = document.getElementById('iframe-container');
            
            const frame = document.createElement('iframe');
            frame.src = `https://play.gamepix.com/${ns}/embed?sid=${SID}`;
            frame.setAttribute('frameborder', '0');
            frame.setAttribute('scrolling', 'no');
            
            container.innerHTML = '';
            container.appendChild(frame);
            view.style.display = 'block';

            // Game Event Listeners
            window.addEventListener('message', (e) => {
                if (e.data.type === 'update_score') console.log("Vault Score:", e.data.score);
            });
        }

        function closeGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('iframe-container').innerHTML = '';
        }

        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'block' : 'none';
            document.getElementById('modal-overlay').style.display = show ? 'block' : 'none';
        }

        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
        }

        function setWeather(type) {
            const overlay = document.getElementById('weather-overlay');
            overlay.innerHTML = '';
            if (type === 'none') return;

            const count = 80;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'weather-item';
                
                const left = Math.random() * 100;
                const dur = 0.5 + Math.random() * 2;
                const delay = Math.random() * 5;

                el.style.left = `${left}%`;
                el.style.animationDuration = `${dur}s`;
                el.style.animationDelay = `-${delay}s`;

                if (type === 'rain') {
                    el.style.width = '1px';
                    el.style.height = '40px';
                    el.style.background = 'rgba(255,255,255,0.15)';
                } else if (type === 'snow') {
                    el.style.width = '4px';
                    el.style.height = '4px';
                    el.style.background = '#fff';
                    el.style.borderRadius = '50%';
                    el.style.opacity = '0.5';
                } else if (type === 'mist') {
                    el.style.width = '150px';
                    el.style.height = '150px';
                    el.style.background = 'rgba(255,255,255,0.03)';
                    el.style.filter = 'blur(20px)';
                    el.style.borderRadius = '50%';
                }

                overlay.appendChild(el);
            }
        }

        initVault();
    </script>
</body>
</html>
