<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Premium Arcade</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --accent-color: #00d4ff;
            --card-bg: #1a1a1a;
            --nav-bg: rgba(20, 20, 20, 0.8);
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-bg: #ffffff;
            --nav-bg: rgba(245, 245, 247, 0.8);
        }

        [data-theme="cyberpunk"] {
            --bg-color: #050505;
            --text-color: #00ff9f;
            --accent-color: #f20587;
            --card-bg: #0d0d0d;
            --nav-bg: rgba(5, 5, 5, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background 0.4s ease;
        }

        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .weather-item {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        header {
            position: sticky;
            top: 0;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-color);
        }

        main { position: relative; z-index: 2; padding: 2rem 5%; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
        }

        .game-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .game-info { padding: 15px; }
        .game-info h3 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Loader & Sentinel */
        #loader {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: var(--accent-color);
            display: none;
        }

        #sentinel { height: 50px; width: 100%; }

        /* Settings & Game View */
        #settings-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            z-index: 1000;
            width: 90%; max-width: 400px;
            border: 1px solid var(--accent-color);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
        }

        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
        }

        .controls { position: absolute; top: 20px; left: 20px; z-index: 2001; }
        button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: var(--accent-color); color: white; font-weight: 600; cursor: pointer;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="weather-overlay"></div>

    <header>
        <div class="logo">The Vault</div>
        <button onclick="toggleSettings(true)">System Settings</button>
    </header>

    <main>
        <div class="game-grid" id="game-grid">
            </div>
        
        <div id="loader">ACCESSING VAULT DATA...</div>
        <div id="sentinel"></div>
    </main>

    <div id="game-view">
        <div class="controls"><button onclick="closeGame()">← Return to Vault</button></div>
        <div id="iframe-container" style="width: 100%; height: 100%;"></div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="toggleSettings(false)"></div>
    <div id="settings-modal">
        <h2 style="margin-top:0">Terminal Config</h2>
        <div class="btn-grid">
            <button onclick="setTheme('dark')">Onyx</button>
            <button onclick="setTheme('light')">Polar</button>
            <button onclick="setTheme('cyberpunk')" style="grid-column: span 2;">Neon Protocol</button>
        </div>
        <hr style="margin:20px 0; border:0; border-top:1px solid #444;">
        <div class="btn-grid">
            <button onclick="setWeather('none')">Static</button>
            <button onclick="setWeather('rain')">Rain</button>
            <button onclick="setWeather('snow')">Snow</button>
        </div>
        <button style="width: 100%; margin-top: 20px; background: #333;" onclick="toggleSettings(false)">Close</button>
    </div>

    <script>
        const SID = "1";
        let nextUrl = `https://feeds.gamepix.com/v2/json?order=quality&pagination=48&sid=${SID}`;
        let isLoading = false;

        /**
         * Fetching Logic
         */
        async function fetchGames() {
            if (isLoading || !nextUrl) return;
            
            isLoading = true;
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch(nextUrl);
                const data = await response.json();
                
                renderGames(data.items);
                nextUrl = data.next_url || null; // Update the URL for the next page
            } catch (err) {
                console.error("Vault pagination error", err);
            } finally {
                isLoading = false;
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderGames(items) {
            const grid = document.getElementById('game-grid');
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => launchGame(item.namespace);
                card.innerHTML = `
                    <img src="${item.banner_image}" alt="${item.title}" loading="lazy">
                    <div class="game-info">
                        <h3>${item.title}</h3>
                        <span style="font-size: 0.7rem; opacity: 0.6">${item.category.toUpperCase()}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        /**
         * Infinite Scroll Observer
         */
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                fetchGames();
            }
        }, { threshold: 0.1 });

        observer.observe(document.getElementById('sentinel'));

        /**
         * Core Functions
         */
        function launchGame(ns) {
            const view = document.getElementById('game-view');
            const container = document.getElementById('iframe-container');
            const frame = document.createElement('iframe');
            frame.src = `https://play.gamepix.com/${ns}/embed?sid=${SID}`;
            frame.setAttribute('frameborder', '0');
            container.innerHTML = '';
            container.appendChild(frame);
            view.style.display = 'block';
        }

        function closeGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('iframe-container').innerHTML = '';
        }

        function toggleSettings(s) {
            document.getElementById('settings-modal').style.display = s ? 'block' : 'none';
            document.getElementById('modal-overlay').style.display = s ? 'block' : 'none';
        }

        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }

        function setWeather(type) {
            const overlay = document.getElementById('weather-overlay');
            overlay.innerHTML = '';
            if (type === 'none') return;
            for (let i = 0; i < 60; i++) {
                const el = document.createElement('div');
                el.className = 'weather-item';
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (0.5 + Math.random() * 2) + 's';
                el.style.animationDelay = `-${Math.random() * 5}s`;
                if (type === 'rain') {
                    el.style.width = '1px'; el.style.height = '30px';
                    el.style.background = 'rgba(255,255,255,0.2)';
                } else {
                    el.style.width = '4px'; el.style.height = '4px';
                    el.style.background = '#fff'; el.style.borderRadius = '50%';
                }
                overlay.appendChild(el);
            }
        }
    </script>
</body>
</html>
