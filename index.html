<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --surface: #0a0a0a;
      --surface-2: #111;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #fff;
      --accent-dim: rgba(255,255,255,0.6);
      --text: #ededed;
      --text-dim: #888;
      --text-dimmer: #555;
      --radius: 6px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── PARTICLES ── */
    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.3;
    }

    #app {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .brand-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg { width: 18px; height: 18px; color: #fff; }
    .brand-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .sidebar-section {
      padding: 8px 8px 4px;
      flex-shrink: 0;
    }

    .nav-label {
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      padding: 8px 8px 4px;
      font-weight: 500;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
      transition: color 0.1s, background 0.1s;
      margin-bottom: 1px;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      line-height: 1.4;
    }

    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--text); background: rgba(255,255,255,0.06); }
    .nav-link svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
    .nav-link.active svg { opacity: 1; }

    .nav-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dimmer);
      font-variant-numeric: tabular-nums;
    }

    .sidebar-footer {
      margin-top: auto;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 8px;
    }

    /* ── MAIN ── */
    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP NAV ── */
    .topnav {
      height: 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 20px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .topnav-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      flex: 1;
    }

    .topnav-title strong { color: var(--text); font-weight: 500; }

    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      color: var(--text-dimmer);
      pointer-events: none;
    }

    .search-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px 6px 30px;
      border-radius: 4px;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      width: 220px;
      transition: border-color 0.1s;
    }

    .search-input::placeholder { color: var(--text-dimmer); }
    .search-input:focus { border-color: rgba(255,255,255,0.25); }

    /* ── TOOLBAR ── */
    .toolbar {
      height: 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .toolbar::-webkit-scrollbar { display: none; }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 400;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active {
      border-color: rgba(255,255,255,0.3);
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .toolbar-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
    }

    .random-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }

    .random-btn:hover { border-color: var(--border-hover); color: var(--text); }

    /* ── GAME GRID ── */
    .grid-wrapper { padding: 20px; flex: 1; }

    #gameGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, background 0.1s;
      position: relative;
    }

    .game-card:hover { background: var(--surface-2); border-color: var(--border-hover); }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .game-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .game-thumb-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .game-thumb-placeholder svg { width: 20px; height: 20px; color: var(--text-dimmer); }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      background: rgba(0,0,0,0.6);
      transition: opacity 0.15s;
    }

    .game-card:hover .play-overlay { opacity: 1; }

    .play-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .play-icon svg { width: 11px; height: 11px; color: #fff; margin-left: 2px; }

    .fav-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .game-card:hover .fav-btn { opacity: 1; }
    .fav-btn.active { opacity: 1; }
    .fav-btn svg { width: 10px; height: 10px; color: var(--text-dim); transition: color 0.1s; }
    .fav-btn.active svg { color: #f59e0b; fill: #f59e0b; }

    .game-info { padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
    .game-info-text { flex: 1; min-width: 0; }

    .game-title {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .game-cat {
      font-size: 11px;
      color: var(--text-dimmer);
      font-variant-numeric: tabular-nums;
    }

    .game-delete {
      display: none;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text-dimmer);
      flex-shrink: 0;
      transition: color 0.1s, border-color 0.1s;
    }

    .game-card.custom .game-delete { display: flex; }
    .game-delete:hover { color: #f43f5e; border-color: rgba(244,63,94,0.3); }
    .game-delete svg { width: 9px; height: 9px; }

    .add-card {
      background: var(--surface);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 28px 16px;
      cursor: pointer;
      color: var(--text-dimmer);
      font-size: 12px;
      font-weight: 400;
      transition: background 0.1s, color 0.1s, border-color 0.15s;
      min-height: 140px;
    }

    .add-card:hover { background: var(--surface-2); color: var(--text-dim); border-color: rgba(255,255,255,0.2); }
    .add-card svg { width: 16px; height: 16px; }

    .empty {
      grid-column: 1/-1;
      padding: 60px 0;
      text-align: center;
      color: var(--text-dimmer);
      font-size: 13px;
      background: var(--surface);
    }

    /* ── GAME PLAYER ── */
    #frameView { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; }
    #frameView.open { display: flex; }

    .frame-bar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .frame-back {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      background: transparent;
      font-family: inherit;
      transition: color 0.1s, border-color 0.1s;
    }

    .frame-back:hover { color: var(--text); border-color: var(--border-hover); }
    .frame-back svg { width: 13px; height: 13px; }
    .frame-title { font-size: 12px; color: var(--text-dim); font-weight: 400; }
    .frame-controls { margin-left: auto; display: flex; gap: 8px; }

    .frame-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      background: transparent;
      font-family: inherit;
      transition: color 0.1s, border-color 0.1s;
    }

    .frame-btn:hover { color: var(--text); border-color: var(--border-hover); }
    .frame-btn svg { width: 12px; height: 12px; }
    #gameIframe { flex: 1; border: none; }

    /* ── MODALS ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: min(480px, 94vw);
      max-height: 85vh;
      overflow-y: auto;
      padding: 0;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 { font-size: 13px; font-weight: 500; }

    .modal-close {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      line-height: 1;
      font-family: inherit;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px; }

    .setting-label {
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .setting-section { margin-bottom: 24px; }

    .swatches { display: flex; gap: 6px; flex-wrap: wrap; }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
      position: relative;
    }

    .swatch:hover { transform: scale(1.08); }
    .swatch.active { border-color: rgba(255,255,255,0.5); }
    .swatch.active::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .pills { display: flex; gap: 4px; flex-wrap: wrap; }

    .pill {
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 400;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }

    .pill:hover { color: var(--text); border-color: var(--border-hover); }
    .pill.active { color: var(--text); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

    .cloak-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px;
    }

    .cloak-opt {
      padding: 8px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      color: var(--text-dim);
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cloak-opt:hover { border-color: var(--border-hover); color: var(--text); }
    .cloak-opt.active { border-color: rgba(255,255,255,0.3); color: var(--text); background: rgba(255,255,255,0.05); }
    .cloak-opt img { width: 16px; height: 16px; object-fit: contain; }
    .cloak-opt span { font-size: 16px; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; font-weight: 500; }

    .form-input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.1s;
    }

    .form-input:focus { border-color: rgba(255,255,255,0.25); }

    .btn-primary {
      width: 100%;
      padding: 8px;
      background: #fff;
      border: none;
      border-radius: 4px;
      color: #000;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }

    .modal-tabs { display: flex; border-bottom: 1px solid var(--border); }

    .modal-tab {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      transition: color 0.1s;
    }

    .modal-tab.active { color: var(--text); border-bottom-color: rgba(255,255,255,0.6); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

    .mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .mobile-toggle svg { width: 16px; height: 16px; }

    @media (max-width: 720px) {
      .mobile-toggle { display: flex; }
      #sidebar { position: fixed; left: -240px; z-index: 45; transition: left 0.2s; }
      #sidebar.open { left: 0; }
      #main { padding-top: 0; }
      .grid-wrapper { padding: 12px; }
      #gameGrid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
  </svg>
</button>

<!-- Game player -->
<div id="frameView">
  <div class="frame-bar">
    <button class="frame-back" onclick="closeGame()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Back
    </button>
    <span class="frame-title" id="frameTitle"></span>
    <div class="frame-controls">
      <button class="frame-btn" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        Fullscreen
      </button>
    </div>
  </div>
  <iframe id="gameIframe" allowfullscreen></iframe>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab(this,'tabAppearance')">Appearance</button>
      <button class="modal-tab" onclick="switchTab(this,'tabCloak')">Tab cloak</button>
    </div>
    <div class="tab-pane active modal-body" id="tabAppearance">
      <div class="setting-section">
        <div class="setting-label">ACCENT COLOR</div>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="setting-section">
        <div class="setting-label">CARD SIZE</div>
        <div class="pills">
          <button class="pill" data-size="compact" onclick="setSize(this,'compact')">Compact</button>
          <button class="pill active" data-size="default" onclick="setSize(this,'default')">Default</button>
          <button class="pill" data-size="large" onclick="setSize(this,'large')">Large</button>
        </div>
      </div>
    </div>
    <div class="tab-pane modal-body" id="tabCloak">
      <div class="setting-section">
        <div class="setting-label">DISGUISE AS</div>
        <div class="cloak-grid" id="cloakGrid"></div>
      </div>
      <div class="setting-section">
        <div class="setting-label">CUSTOM TITLE</div>
        <input class="form-input" id="customCloakTitle" placeholder="e.g. Google Classroom" oninput="applyCustomCloak()" />
      </div>
      <div class="setting-section">
        <div class="setting-label">CUSTOM FAVICON URL</div>
        <input class="form-input" id="customCloakFavicon" placeholder="https://..." oninput="applyCustomCloak()" />
      </div>
    </div>
  </div>
</div>

<!-- Add game modal -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add a game</h2>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">TITLE</label>
        <input class="form-input" id="cgTitle" placeholder="e.g. Pacman" />
      </div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input class="form-input" id="cgUrl" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label class="form-label">CATEGORY</label>
        <select class="form-input" id="cgCat">
          <option>Arcade</option>
          <option>Action</option>
          <option>Shooter</option>
          <option>Sports</option>
          <option>Puzzle</option>
          <option>Horror</option>
          <option>Other</option>
        </select>
      </div>
      <button class="btn-primary" onclick="saveCustomGame()">Add game</button>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <nav id="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/>
          <line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/>
          <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.544-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>
        </svg>
      </div>

    <div class="sidebar-section">
      <div class="nav-label">Browse</div>
      <button class="nav-link active" id="navAll" onclick="filterNav('all',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        All games
        <span class="nav-badge" id="totalBadge">0</span>
      </button>
      <button class="nav-link" id="navFavs" onclick="filterNav('favorites',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

        <span class="nav-badge" id="favBadge">0</span>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </nav>

  <main id="main">
    <div class="topnav">
      <div class="topnav-title"><strong>Library</strong></div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search games..." autocomplete="off" />
      </div>
    </div>

    <div class="toolbar" id="catRow">
      <button class="random-btn" onclick="playRandom()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        Random
      </button>
    </div>

    <div class="grid-wrapper">
      <div id="gameGrid"></div>
    </div>
  </main>
</div>

<script>
  const THEMES = [
    { id: 'white',  color: '#ffffff' },
    { id: 'indigo', color: '#6366f1' },
    { id: 'violet', color: '#8b5cf6' },
    { id: 'rose',   color: '#f43f5e' },
    { id: 'cyan',   color: '#06b6d4' },
    { id: 'green',  color: '#10b981' },
    { id: 'amber',  color: '#f59e0b' },
  ];

  const CLOAK_PRESETS = [
    { id: 'none',       label: 'Off',                  emoji: '🎮', title: null,                                   favicon: null },
    { id: 'classroom',  label: 'Google Classroom',     img: 'https://ssl.gstatic.com/classroom/favicon.png',        title: 'Home' },
    { id: 'drive',      label: 'Google Drive',         img: 'https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png', title: 'My Drive - Google Drive' },
    { id: 'docs',       label: 'Google Docs',          img: 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico', title: 'Untitled document - Google Docs' },
    { id: 'khan',       label: 'Khan Academy',         img: 'https://cdn.kastatic.org/images/apple-touch-icon-114x114-precomposed.new.png', title: 'Khan Academy' },
    { id: 'canvas',     label: 'Canvas LMS',           img: 'https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico', title: 'Dashboard - Canvas' },
    { id: 'wikipedia',  label: 'Wikipedia',            img: 'https://en.wikipedia.org/static/favicon/wikipedia.ico', title: 'Wikipedia' },
    { id: 'quizlet',    label: 'Quizlet',              img: 'https://quizlet.com/favicon.ico',                      title: 'Quizlet' },
    { id: 'schoology',  label: 'Schoology',            img: 'https://asset-cdn.schoology.com/sites/all/themes/schoology_theme/favicon.ico', title: 'Schoology' },
  ];

  const state = {
    cat: 'all',
    query: '',
    theme: localStorage.getItem('vault_theme') || 'white',
    gridSize: localStorage.getItem('vault_grid') || 'default',
    favorites: JSON.parse(localStorage.getItem('vault_favorites') || '[]'),
    customGames: JSON.parse(localStorage.getItem('vault_custom_games') || '[]'),
    cloak: localStorage.getItem('vault_cloak') || 'none',
  };

  let GAMES = [];

  const GN_COVER_URL = 'https://cdn.jsdelivr.net/gh/freebuisness/covers@main';
  const GN_HTML_URL  = 'https://cdn.jsdelivr.net/gh/freebuisness/html@main';
  const GN_ZONES_URLS = [
    'https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json',
    'https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json',
    'https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json',
    'https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json',
  ];

  let rawZones = [];

  function resolveZoneURL(url) {
    return url.replace('{COVER_URL}', GN_COVER_URL).replace('{HTML_URL}', GN_HTML_URL);
  }

  function guessCategory(zone) {
    const tags = (zone.special || []).map(t => t.toLowerCase());
    if (tags.includes('fps') || tags.includes('shooter')) return 'Shooter';
    if (tags.includes('horror')) return 'Horror';
    if (tags.includes('puzzle')) return 'Puzzle';
    if (tags.includes('sports')) return 'Sports';
    if (tags.includes('idle') || tags.includes('clicker')) return 'Idle';
    if (tags.includes('platformer')) return 'Platformer';
    if (tags.includes('rhythm')) return 'Rhythm';
    if (tags.includes('racing') || tags.includes('driving')) return 'Racing';
    if (tags.includes('rpg') || tags.includes('adventure')) return 'RPG';
    if (tags.includes('strategy')) return 'Strategy';
    return 'Arcade';
  }

  async function loadGames() {
    document.getElementById('gameGrid').innerHTML = '<div class="empty">Loading games...</div>';

    let zonesURL = GN_ZONES_URLS[Math.floor(Math.random() * GN_ZONES_URLS.length)];
    try {
      const shaRes = await fetch('https://api.github.com/repos/freebuisness/assets/commits?t=' + Date.now());
      if (shaRes.ok) {
        const shaJson = await shaRes.json();
        const sha = shaJson[0]?.sha;
        if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
      }
    } catch (_) {}

    try {
      const res = await fetch(zonesURL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      rawZones = await res.json();

      GAMES = rawZones.map(z => ({
        title: z.name,
        path: z.url,
        thumb: z.cover ? resolveZoneURL(z.cover) : null,
        cat: guessCategory(z),
        desc: z.description || '',
        _zoneId: z.id,
        _isExternalLink: z.url.startsWith('http'),
      }));
    } catch (e) {
      console.warn('Failed to load zones:', e);
      document.getElementById('gameGrid').innerHTML = '<div class="empty">Failed to load games. Check your connection.</div>';
      return;
    }

    renderCats();
    render();
  }

  function allGames() { return [...GAMES, ...state.customGames]; }

  function filtered() {
    const q = state.query.toLowerCase();
    return allGames().filter(g => {
      const matchQ = !q || g.title.toLowerCase().includes(q) || (g.cat||'').toLowerCase().includes(q) || (g.desc||'').toLowerCase().includes(q);
      if (state.cat === 'favorites') return matchQ && state.favorites.includes(g.path);
      const matchC = state.cat === 'all' || g.cat === state.cat;
      return matchQ && matchC;
    });
  }

  function applyTheme(id) {
    const t = THEMES.find(x => x.id === id) || THEMES[0];
    state.theme = id;
    localStorage.setItem('vault_theme', id);
    document.documentElement.style.setProperty('--accent', t.color);
    renderSwatches();
  }

  function renderSwatches() {
    document.getElementById('swatches').innerHTML = THEMES.map(t =>
      `<div class="swatch ${t.id === state.theme ? 'active' : ''}" style="background:${t.color}" onclick="applyTheme('${t.id}')"></div>`
    ).join('');
  }

  function setSize(el, size) {
    document.querySelectorAll('.pill[data-size]').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    state.gridSize = size;
    localStorage.setItem('vault_grid', size);
    applyGridSize();
  }

  function applyGridSize() {
    const map = { compact: '150px', default: '200px', large: '260px' };
    const grid = document.getElementById('gameGrid');
    grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(${map[state.gridSize]}, 1fr))`;
    grid.style.gap = '12px';
  }

  const ORIG_TITLE = document.title;
  const ORIG_FAVICON = document.querySelector('link[rel="icon"]') ? document.querySelector('link[rel="icon"]').href : '';

  function setFavicon(url) {
    let link = document.querySelector('link[rel="icon"]');
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = url;
  }

  function applyCloak(id) {
    state.cloak = id;
    localStorage.setItem('vault_cloak', id);
    const preset = CLOAK_PRESETS.find(p => p.id === id);
    if (!preset || id === 'none') {
      document.title = ORIG_TITLE;
      setFavicon(ORIG_FAVICON);
    } else {
      document.title = preset.title || ORIG_TITLE;
      setFavicon(preset.img || ORIG_FAVICON);
    }
    renderCloakGrid();
  }

  function applyCustomCloak() {
    const title = document.getElementById('customCloakTitle').value.trim();
    const favicon = document.getElementById('customCloakFavicon').value.trim();
    if (title) document.title = title;
    if (favicon) setFavicon(favicon);
    state.cloak = 'custom';
    localStorage.setItem('vault_cloak', 'custom');
    localStorage.setItem('vault_cloak_title', title);
    localStorage.setItem('vault_cloak_favicon', favicon);
    document.querySelectorAll('.cloak-opt').forEach(x => x.classList.remove('active'));
  }

  function renderCloakGrid() {
    document.getElementById('cloakGrid').innerHTML = CLOAK_PRESETS.map(p => {
      const icon = p.img
        ? `<img src="${p.img}" alt="" onerror="this.style.display='none'">`
        : `<span>${p.emoji || '🎮'}</span>`;
      return `<button class="cloak-opt ${state.cloak === p.id ? 'active' : ''}" onclick="applyCloak('${p.id}')">${icon}${p.label}</button>`;
    }).join('');
  }

  function initCloak() {
    if (state.cloak === 'custom') {
      const t = localStorage.getItem('vault_cloak_title');
      const f = localStorage.getItem('vault_cloak_favicon');
      if (t) document.title = t;
      if (f) setFavicon(f);
    } else if (state.cloak !== 'none') {
      applyCloak(state.cloak);
    }
  }

  function render() {
    const games = filtered();
    const total = allGames().length;
    document.getElementById('totalBadge').textContent = total;
    document.getElementById('favBadge').textContent = state.favorites.length;

    if (!games.length) {
      document.getElementById('gameGrid').innerHTML =
        `<div class="empty">No games found${state.query ? ` for "${state.query}"` : ''}.</div>`;
      return;
    }

    const safePath = p => p.replace(/'/g, "\\'");

    const html = games.map(g => {
      const fav = state.favorites.includes(g.path);
      const sp = safePath(g.path);
      const st = g.title.replace(/'/g, "\\'");
      const thumb = g.thumb
        ? `<img src="${g.thumb}" alt="${g.title}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="game-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>`;
      const del = g.isCustom
        ? `<button class="game-delete" onclick="event.stopPropagation();deleteGame('${sp}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`
        : '';
      return `<div class="game-card${g.isCustom ? ' custom' : ''}" onclick="playGame('${sp}','${st}')" title="${g.desc || g.title}">
        <div class="game-thumb">
          ${thumb}
          <div class="play-overlay"><div class="play-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
          <button class="fav-btn${fav ? ' active' : ''}" onclick="event.stopPropagation();toggleFav('${sp}','${st}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>
        <div class="game-info"><div class="game-info-text"><div class="game-title">${g.title}</div><div class="game-cat">${g.cat || 'Game'}</div></div>${del}</div>
      </div>`;
    }).join('');

    document.getElementById('gameGrid').innerHTML = html +
      `<div class="add-card" onclick="openModal('addModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add game</div>`;
  }

  function renderCats() {
    const all = allGames();
    const rawCats = [...new Set(all.filter(g => g.cat).map(g => g.cat))].sort();
    const cats = ['all', 'favorites', ...rawCats];

    document.getElementById('catRow').innerHTML = cats.map(c => {
      const label = c === 'all' ? 'All' : c === 'favorites' ? '★ Favorites' : c;
      const count = c === 'all' ? all.length : c === 'favorites' ? state.favorites.length : all.filter(g => g.cat === c).length;
      return `<button class="filter-btn${state.cat === c ? ' active' : ''}" onclick="filterCat('${c}')">${label} <span style="opacity:.45;margin-left:3px">${count}</span></button>`;
    }).join('') +
    `<button class="random-btn" onclick="playRandom()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      Random
    </button>`;

    document.getElementById('navCats').innerHTML = rawCats.map(c =>
      `<button class="nav-link" onclick="filterNav('${c}',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>${c}
      </button>`
    ).join('');
  }

  function filterCat(cat) {
    state.cat = cat;
    renderCats();
    render();
  }

  function filterNav(cat, el) {
    document.querySelectorAll('#sidebar .nav-link').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    state.cat = cat;
    renderCats();
    render();
  }

  function toggleFav(path, title) {
    const idx = state.favorites.indexOf(path);
    if (idx > -1) state.favorites.splice(idx, 1);
    else state.favorites.push(path);
    localStorage.setItem('vault_favorites', JSON.stringify(state.favorites));
    renderCats();
    render();
  }

  function saveCustomGame() {
    const title = document.getElementById('cgTitle').value.trim();
    const url = document.getElementById('cgUrl').value.trim();
    const cat = document.getElementById('cgCat').value;
    if (!title || !url) return alert('Please fill in the title and URL.');
    state.customGames.push({ title, path: url, cat, isCustom: true });
    localStorage.setItem('vault_custom_games', JSON.stringify(state.customGames));
    document.getElementById('cgTitle').value = '';
    document.getElementById('cgUrl').value = '';
    closeModal('addModal');
    renderCats();
    render();
  }

  function deleteGame(path) {
    state.customGames = state.customGames.filter(g => g.path !== path);
    localStorage.setItem('vault_custom_games', JSON.stringify(state.customGames));
    renderCats();
    render();
  }

  function playGame(path, title) {
    const zone = rawZones.find(z => z.url === path);

    if (!zone) {
      document.getElementById('gameIframe').src = path;
      document.getElementById('frameTitle').textContent = title;
      document.getElementById('frameView').classList.add('open');
      return;
    }

    if (path.startsWith('http')) {
      window.open(path, '_blank');
      return;
    }

    const resolvedURL = resolveZoneURL(path) + '?t=' + Date.now();
    document.getElementById('frameTitle').textContent = title;
    document.getElementById('frameView').classList.add('open');

    const iframe = document.getElementById('gameIframe');
    iframe.src = 'about:blank';

    fetch(resolvedURL)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(html => {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        const baseTag = `<base href="${GN_HTML_URL}/">`;
        const errorGuard = `<script>window.onerror=function(){return true;};<\/script>`;
        let injected = html.replace(/(<head[^>]*>)/i, '$1' + baseTag + errorGuard);
        if (!injected.includes('<base')) injected = baseTag + errorGuard + html;
        doc.write(injected);
        doc.close();
      })
      .catch(err => {
        alert('Failed to load game: ' + err.message);
        closeGame();
      });
  }

  function closeGame() {
    document.getElementById('frameView').classList.remove('open');
    const iframe = document.getElementById('gameIframe');
    iframe.src = 'about:blank';
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open(); doc.write(''); doc.close();
    } catch(_) {}
  }

  function toggleFullscreen() {
    const el = document.getElementById('gameIframe');
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }

  function playRandom() {
    const games = allGames().filter(g => !g._isExternalLink);
    if (!games.length) return;
    const g = games[Math.floor(Math.random() * games.length)];
    playGame(g.path, g.title);
  }

  function openSettings() {
    renderSwatches();
    renderCloakGrid();
    document.querySelectorAll('.pill[data-size]').forEach(p =>
      p.classList.toggle('active', p.dataset.size === state.gridSize)
    );
    document.getElementById('customCloakTitle').value = localStorage.getItem('vault_cloak_title') || '';
    document.getElementById('customCloakFavicon').value = localStorage.getItem('vault_cloak_favicon') || '';
    openModal('settingsModal');
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('.overlay').forEach(el =>
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
  );

  function switchTab(btn, paneId) {
    btn.closest('.modal').querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    btn.closest('.modal').querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(paneId).classList.add('active');
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    state.query = e.target.value.trim();
    render();
  });

  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (e.key === 'Escape') { closeModal('settingsModal'); closeModal('addModal'); closeGame(); }
    if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  /* ── PARTICLES ── */
  function initParticles() {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, pts;

    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }

    function spawn() {
      pts = [];
      for (let i = 0; i < 30; i++) {
        pts.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 1.2 + 0.3,
          o: Math.random() * 0.3 + 0.1,
        });
      }
    }

    let mouse = { x: -999, y: -999 };
    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    let lastFrame = 0;
    function draw(ts) {
      requestAnimationFrame(draw);
      if (ts - lastFrame < 30) return;
      lastFrame = ts;

      ctx.clearRect(0, 0, w, h);

      for (const p of pts) {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 22500) {
          const d = Math.sqrt(d2);
          const f = (150 - d) / 150 * 0.012;
          p.vx += dx * f; p.vy += dy * f;
        }
        p.vx *= 0.99; p.vy *= 0.99;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, 6.28318);
        ctx.fillStyle = `rgba(255,255,255,${p.o})`;
        ctx.fill();
      }

      ctx.lineWidth = 0.4;
      for (let i = 0; i < pts.length; i++) {
        for (let j = i+1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d2 = dx*dx + dy*dy;
          if (d2 < 14400) {
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(255,255,255,${(1 - Math.sqrt(d2)/120) * 0.07})`;
            ctx.stroke();
          }
        }
      }
    }

    window.addEventListener('resize', () => { resize(); spawn(); });
    resize(); spawn();
    requestAnimationFrame(draw);
  }

  applyTheme(state.theme);
  applyGridSize();
  initCloak();
  initParticles();
  loadGames();
</script>
</body>
</html>
