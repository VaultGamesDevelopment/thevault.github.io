<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault</title>

<link id="tab-favicon" rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_drive_2020q4.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#050507;
    --card:#0f0f14;
    --border:#1f1f25;
    --accent:#6366f1;
    --text:#fff;
}

[data-theme="light"] {
    --bg:#f5f5f5;
    --card:#ffffff;
    --border:#e5e5e5;
    --text:#111;
}

/* BASE */
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAV */
.nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 5%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo {
    font-weight:800;
    cursor:pointer;
}

.nav-links {
    display:flex;
    gap:20px;
}

.nav-links a {
    cursor:pointer;
    opacity:0.7;
}

.nav-links a.active {
    opacity:1;
}

#search {
    padding:8px;
    border-radius:10px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:30px 5%;
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    border-color:var(--accent);
}

.card img {
    width:100%;
    height:130px;
    object-fit:cover;
}

/* PARTNERS */
.partner {
    padding:20px;
    border-radius:20px;
    background:var(--card);
    text-align:center;
}

.partner a {
    display:block;
    margin-top:10px;
    background:var(--accent);
    padding:10px;
    border-radius:10px;
    color:white;
    text-decoration:none;
}

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* GAME VIEW */
#game-view {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    display:none;
    flex-direction:column;
    z-index:5000;
}

#game-view iframe {
    flex:1;
    border:none;
}

/* MODAL */
#settings {
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    background:#111;
    padding:20px;
    border-radius:15px;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

#settings.active {
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
    pointer-events:all;
}

.overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo" onclick="show('home')">THE VAULT</div>

    <div class="nav-links">
        <a onclick="show('home')" id="nav-home" class="active">Arcade</a>
        <a onclick="show('partners')" id="nav-partners">Partners</a>
    </div>

    <input id="search" placeholder="Search..." oninput="filter()">
    <button onclick="toggleSettings(true)">⚙️</button>
</div>

<!-- VIEWS -->
<div id="home" class="view active">
    <div class="grid" id="grid"></div>
    <div id="sentinel"></div>
</div>

<div id="partners" class="view">
    <div class="grid">
        <div class="partner">
            <h3>GamePix</h3>
            <p>HTML5 Game Provider</p>
            <a href="https://gamepix.com" target="_blank">Visit</a>
        </div>

        <div class="partner">
            <h3>Jaime's Site</h3>
            <p>Custom Games</p>
            <a href="https://sites.google.com/view/jaimescheesegrater" target="_blank">Visit</a>
        </div>
    </div>
</div>

<!-- GAME VIEW -->
<div id="game-view">
    <button onclick="closeGame()">← Back</button>
    <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div class="overlay" id="overlay" onclick="toggleSettings(false)"></div>

<div id="settings">
    <h3>Settings</h3>

    <label>Theme</label><br>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>

    <br><br>

    <label>Tab Cloak</label><br>
    <button onclick="cloak('google')">Google</button>
    <button onclick="cloak('drive')">Drive</button>
    <button onclick="cloak('none')">None</button>

    <br><br>

    <label>Music</label><br>
    <button onclick="toggleMusic()">Play/Pause</button><br>
    <input type="range" id="vol" min="0" max="100" value="50">

    <br><br>
    <button onclick="toggleSettings(false)">Close</button>
</div>

<audio id="music" loop src="./bgmusic.mp3"></audio>

<script>
const SID="1";
let next=`https://feeds.gamepix.com/v2/json?order=quality&pagination=24&sid=${SID}`;

/* NAV */
function show(v){
    document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
    document.getElementById(v).classList.add("active");

    document.querySelectorAll(".nav-links a").forEach(x=>x.classList.remove("active"));
    document.getElementById("nav-"+v).classList.add("active");
}

/* LOAD */
async function load(){
    const res=await fetch(next);
    const data=await res.json();

    data.items.forEach(g=>{
        const c=document.createElement("div");
        c.className="card";
        c.setAttribute("data",g.title.toLowerCase());

        c.onclick=()=>{
            document.getElementById("frame").src=
                `https://play.gamepix.com/${g.namespace}/embed?sid=${SID}`;
            document.getElementById("game-view").style.display="flex";
        };

        c.innerHTML=`<img src="${g.banner_image}"><p>${g.title}</p>`;
        grid.appendChild(c);
    });

    next=data.next_url;
}

/* SEARCH */
function filter(){
    const q=search.value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display=c.getAttribute("data").includes(q)?"block":"none";
    });
}

/* GAME */
function closeGame(){
    game-view.style.display="none";
    frame.src="";
}

/* SETTINGS */
function toggleSettings(v){
    settings.classList.toggle("active",v);
    overlay.style.display=v?"block":"none";
}

/* THEME */
function setTheme(t){
    document.documentElement.setAttribute("data-theme",t);
}

/* CLOAK */
function cloak(t){
    if(t==="google") document.title="Google";
    if(t==="drive") document.title="My Drive";
    if(t==="none") document.title="The Vault";
}

/* MUSIC */
const music=document.getElementById("music");
const vol=document.getElementById("vol");

vol.oninput=()=>music.volume=vol.value/100;

function toggleMusic(){
    music.paused?music.play():music.pause();
}

document.addEventListener("click",()=>music.play(),{once:true});

/* SCROLL */
const obs=new IntersectionObserver(e=>{
    if(e[0].isIntersecting) load();
});
obs.observe(document.getElementById("sentinel"));

load();
</script>

</body>
</html>
