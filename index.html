<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="tab-title">The Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#050505;
    --text:#fff;
    --accent:#3b82f6;
    --card:#0f0f0f;
    --border:#262626;
    --nav:rgba(5,5,5,.8);
    --secondary:#aaa;
}

/* THEMES */
[data-theme="midnight"]{--bg:#020617;--card:#0f172a;--accent:#38bdf8;}
[data-theme="forest"]{--bg:#052e16;--card:#064e3b;--accent:#4ade80;}
[data-theme="crimson"]{--bg:#450a0a;--card:#7f1d1d;--accent:#f87171;}
[data-theme="space"]{--bg:#020205;--card:#090915;--accent:#a855f7;}
[data-theme="rose"]{--bg:#1a0f14;--card:#2d1a22;--accent:#fb7185;}
[data-theme="gold"]{--bg:#0a0a05;--card:#1c1917;--accent:#eab308;}
[data-theme="uv"]{--bg:#0f0720;--card:#1c1033;--accent:#22d3ee;}

body{
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:.3s;
}

/* NAV */
header{
    position:sticky;
    top:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 5%;
    background:var(--nav);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
}

.logo{
    font-weight:800;
    cursor:pointer;
}
.logo:hover{color:var(--accent);}

/* NAV LINKS */
nav{display:flex;gap:20px;}
nav a{
    cursor:pointer;
    color:var(--secondary);
    text-decoration:none;
    font-size:.8rem;
}
nav a.active{color:white;}

/* SEARCH */
#search{
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.05);
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
    padding:40px 5%;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}
.card:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
}
.card img{width:100%;}

/* VIEWS */
.view{display:none;}
.view.active{display:block;}

/* GAME */
#game{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    z-index:1000;
}
#game iframe{width:100%;height:100%;border:none;}

/* MODAL */
#modal,#overlay{
    display:none;
    position:fixed;
}
#overlay{
    inset:0;
    background:rgba(0,0,0,.7);
}
#modal{
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:var(--card);
    padding:30px;
    border-radius:20px;
    z-index:2000;
    width:400px;
}

/* BUTTON */
.btn{
    padding:8px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    background:transparent;
    color:white;
    cursor:pointer;
}
.btn:hover{border-color:white;}
</style>
</head>

<body>

<header>
<div class="logo" onclick="showView('home')">THE VAULT</div>

<nav>
<a id="nav-home" class="active" onclick="showView('home')">Arcade</a>
<a id="nav-partners" onclick="showView('partners')">Partners</a>
</nav>

<input id="search" placeholder="Search..." oninput="filterGames()">

<button class="btn" onclick="toggleSettings(true)">Settings</button>
</header>

<!-- HOME -->
<div id="home" class="view active">
<div class="grid" id="grid"></div>
</div>

<!-- PARTNERS -->
<div id="partners" class="view">
<div class="grid">
<div class="card">
<img src="https://www.gamepix.com/icons/favicon-96x96.png">
<div style="padding:10px">GamePix</div>
</div>
</div>
</div>

<!-- GAME -->
<div id="game">
<button onclick="closeGame()" style="position:absolute;z-index:10">← Exit</button>
<iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div id="overlay" onclick="toggleSettings(false)"></div>
<div id="modal">
<h3>Settings</h3>

<div>
<p>Theme</p>
<button class="btn" onclick="setTheme('dark')">Dark</button>
<button class="btn" onclick="setTheme('midnight')">Midnight</button>
<button class="btn" onclick="setTheme('forest')">Forest</button>
<button class="btn" onclick="setTheme('crimson')">Crimson</button>
</div>

<br>

<div>
<p>Music</p>
<button class="btn" onclick="toggleMusic()">Play / Pause</button>
<input type="range" id="vol" min="0" max="100">
</div>

<br>
<button class="btn" onclick="toggleSettings(false)">Close</button>
</div>

<audio id="music" loop src="bgmusic.mp3"></audio>

<script>
let next="https://feeds.gamepix.com/v2/json?pagination=24";

/* NAV */
function showView(v){
    document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
    document.getElementById(v).classList.add("active");
}

/* LOAD GAMES */
async function load(){
    let res=await fetch(next);
    let data=await res.json();

    let grid=document.getElementById("grid");

    data.items.forEach(g=>{
        let el=document.createElement("div");
        el.className="card";
        el.setAttribute("data",g.title.toLowerCase());

        el.onclick=()=>{
            openGame(`https://play.gamepix.com/${g.namespace}/embed`);
        };

        el.innerHTML=`
            <img src="${g.banner_image}">
            <div style="padding:10px">${g.title}</div>
        `;
        grid.appendChild(el);
    });

    next=data.next_url;
}

/* GAME */
function openGame(url){
    document.getElementById("game").style.display="block";
    document.getElementById("frame").src=url;
}
function closeGame(){
    document.getElementById("game").style.display="none";
    document.getElementById("frame").src="";
}

/* SEARCH */
function filterGames(){
    let q=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display=c.getAttribute("data").includes(q)?"block":"none";
    });
}

/* SETTINGS */
function toggleSettings(s){
    document.getElementById("modal").style.display=s?"block":"none";
    document.getElementById("overlay").style.display=s?"block":"none";
}

/* THEME */
function setTheme(t){
    document.documentElement.setAttribute("data-theme",t);
}

/* MUSIC */
const music=document.getElementById("music");
const vol=document.getElementById("vol");

vol.oninput=()=>music.volume=vol.value/100;

function toggleMusic(){
    if(music.paused){music.play();}
    else{music.pause();}
}

/* INIT */
load();
</script>

</body>
</html>
