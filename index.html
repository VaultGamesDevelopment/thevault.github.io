<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Vault</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="./g/assets/imgs/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0f19;
    --panel:#0f1629;
    --panel2:#111a2e;
    --text:#e6e6e6;
    --muted:#8b93a7;
    --accent:#6c7cff;
    --border:rgba(255,255,255,0.08);
    --glow:rgba(108,124,255,0.25);
}

*{box-sizing:border-box;font-family:Inter,sans-serif;}
body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* LOADING SCREEN */
#loader{
    position:fixed;
    inset:0;
    background:#0b0f19;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    font-weight:800;
    font-size:22px;
    letter-spacing:2px;
    animation:pulse 1.2s infinite;
}
@keyframes pulse{
    0%{opacity:.4}
    50%{opacity:1}
    100%{opacity:.4}
}

/* LAYOUT */
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:15px;
}
.logo{font-weight:800;margin-bottom:15px;}
.btn{
    width:100%;
    margin-bottom:8px;
    padding:8px;
    background:var(--panel2);
    border:1px solid var(--border);
    color:white;
    border-radius:8px;
    cursor:pointer;
}
.btn:hover{
    border-color:var(--accent);
    box-shadow:0 0 10px var(--glow);
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{
    padding:10px;
    border-bottom:1px solid var(--border);
}
.search{
    width:250px;
    padding:8px;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--panel);
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:20px;
    overflow:auto;
}
.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.25s;
}
.card:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
    box-shadow:0 10px 20px rgba(0,0,0,.4),0 0 10px var(--glow);
}
.card img{width:100%;height:110px;object-fit:cover;}
.card h3{font-size:13px;padding:10px;margin:0;}

/* VIEWS */
.view{display:none;height:100%;}
.view.active{display:block;}

/* GAME VIEW */
#gameview{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    flex-direction:column;
}
#gameview iframe{flex:1;border:none;}
.gamebar{padding:10px;background:#111}

/* SETTINGS */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(10px);
    display:none;
    align-items:center;
    justify-content:center;
    opacity:1;
    transition:.2s;
}
.panel{
    background:var(--panel);
    padding:20px;
    border-radius:12px;
    width:350px;
}

/* PARTNER BUTTONS */
.partner{
    display:block;
    padding:15px;
    border-radius:10px;
    background:var(--panel);
    border:1px solid var(--border);
    text-decoration:none;
    color:white;
}
.partner:hover{
    border-color:var(--accent);
}
</style>
</head>

<body>

<div id="loader">LOADING VAULT...</div>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">⚡ VAULT</div>

    <button class="btn" onclick="showView('arcade')">Arcade</button>
    <button class="btn" onclick="showView('partners')">Partners</button>
    <button class="btn" onclick="openSettings()">Settings</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
    <input class="search" id="search" placeholder="Search..." oninput="filterGames()">
</div>

<div id="arcade" class="view active">
    <div class="grid" id="grid"></div>
</div>

<div id="partners" class="view">
    <div class="grid">
        <a class="partner" href="https://www.gamepix.com" target="_blank">GamePix</a>
        <a class="partner" href="https://sites.google.com" target="_blank">Google Sites</a>
    </div>
</div>

</div>
</div>

<!-- GAME -->
<div id="gameview">
    <div class="gamebar">
        <button onclick="closeGame()">← Back</button>
    </div>
    <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div class="modal" id="modal" onclick="closeSettings(event)">
    <div class="panel">
        <h3>Settings</h3>
        <button onclick="setTheme('#6c7cff')">Blue</button>
        <button onclick="setTheme('#ff4d6d')">Red</button>
        <button onclick="setTheme('#22c55e')">Green</button>
        <br><br>
        <button onclick="closeSettings()">Close</button>
    </div>
</div>

<script>
const SID="1";

/* LOAD GAMES */
async function loadGames(){
    try{
        const res = await fetch(
        `https://feeds.gamepix.com/v2/json?sid=${SID}&pagination=100&order=quality`
        );

        const data = await res.json();
        if(!data.items) return;

        const grid=document.getElementById("grid");

        data.items.forEach(g=>{
            const c=document.createElement("div");
            c.className="card";
            c.setAttribute("data-title",g.title.toLowerCase());

            c.onclick=()=>{
                document.getElementById("gameview").style.display="flex";
                document.getElementById("frame").src=
                `https://play.gamepix.com/${g.namespace}/embed?sid=${SID}`;
            };

            c.innerHTML=`<img src="${g.banner_image}"><h3>${g.title}</h3>`;
            grid.appendChild(c);
        });

        /* HIDE LOADER */
        setTimeout(()=>{
            document.getElementById("loader").style.display="none";
        },500);

    }catch(e){
        console.error(e);
    }
}

/* FILTER */
function filterGames(){
    let q=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display=c.dataset.title.includes(q)?"block":"none";
    });
}

/* NAV */
function showView(v){
    document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
    document.getElementById(v).classList.add("active");
}

/* GAME */
function closeGame(){
    document.getElementById("gameview").style.display="none";
    document.getElementById("frame").src="";
}

/* SETTINGS FIX */
function openSettings(){
    const m=document.getElementById("modal");
    m.style.display="flex";
}

function closeSettings(e){
    if(e && e.target.id!=="modal") return;

    const m=document.getElementById("modal");
    m.style.opacity="0";

    setTimeout(()=>{
        m.style.display="none";
        m.style.opacity="1";
    },200);
}

/* THEME */
function setTheme(color){
    document.documentElement.style.setProperty("--accent",color);
}

loadGames();
</script>

</body>
</html>
