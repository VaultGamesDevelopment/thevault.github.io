<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault</title>

<link rel="icon" href="./g/assets/imgs/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0f19;
    --panel:#0f1629;
    --panel2:#111a2e;
    --text:#e6e6e6;
    --muted:#8b93a7;
    --accent:#6c7cff;
    --border:rgba(255,255,255,0.08);
    --glow:rgba(108,124,255,0.25);
}

*{box-sizing:border-box;font-family:Inter,sans-serif;}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* LOADER */
#loader{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0b0f19;
    font-weight:800;
    z-index:9999;
    animation:pulse 1.2s infinite;
}
@keyframes pulse{
    0%{opacity:.4}
    50%{opacity:1}
    100%{opacity:.4}
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 20px;
    background:rgba(15,22,41,.8);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
}

.logo{
    font-weight:800;
    letter-spacing:1px;
}

.nav{
    display:flex;
    gap:10px;
}

.nav button{
    background:var(--panel2);
    border:1px solid var(--border);
    color:white;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
}
.nav button:hover{
    border-color:var(--accent);
}

/* SEARCH */
.search{
    padding:7px;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--panel);
    color:white;
}

/* MAIN */
.main{
    height:calc(100vh - 60px);
    display:flex;
    flex-direction:column;
}

/* GRID */
.grid{
    flex:1;
    overflow-y:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.25s;
}
.card:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
    box-shadow:0 10px 20px rgba(0,0,0,.4),0 0 10px var(--glow);
}
.card img{width:100%;height:110px;object-fit:cover;}
.card h3{font-size:13px;padding:10px;margin:0;}

/* GAME VIEW */
#gameview{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    flex-direction:column;
}
#gameview iframe{flex:1;border:none;}
.gamebar{padding:10px;background:#111}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(10px);
}

.panel{
    background:var(--panel);
    padding:20px;
    border-radius:12px;
    width:350px;
}

/* SETTINGS UI */
.setting{
    margin-bottom:15px;
}
.setting h4{
    margin:0 0 5px 0;
    font-size:13px;
    color:var(--muted);
}

.btn{
    padding:6px 10px;
    border-radius:6px;
    border:1px solid var(--border);
    background:var(--panel2);
    color:white;
    cursor:pointer;
}
.btn:hover{
    border-color:var(--accent);
}

/* PARTICLES */
#particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
}
.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:.4;
    animation:fall linear infinite;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div id="loader">LOADING VAULT...</div>

<div id="particles"></div>

<!-- HEADER -->
<div class="header">
    <div class="logo">⚡ VAULT</div>

    <div class="nav">
        <button onclick="showView('arcade')">Arcade</button>
        <button onclick="showView('partners')">Partners</button>
        <button onclick="openSettings()">Settings</button>
    </div>

    <input class="search" id="search" placeholder="Search..." oninput="filterGames()">
</div>

<!-- MAIN -->
<div class="main">

<div id="arcade" class="grid"></div>

<div id="partners" class="grid" style="display:none">
    <a class="card" href="https://www.gamepix.com" target="_blank">
        <h3 style="padding:20px">GamePix</h3>
    </a>
</div>

</div>

<!-- GAME -->
<div id="gameview">
    <div class="gamebar">
        <button onclick="closeGame()">← Back</button>
    </div>
    <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div class="modal" id="modal">
<div class="panel">

<h3>Settings</h3>

<div class="setting">
<h4>Theme</h4>
<button class="btn" onclick="setTheme('#6c7cff')">Blue</button>
<button class="btn" onclick="setTheme('#ff4d6d')">Red</button>
<button class="btn" onclick="setTheme('#22c55e')">Green</button>
<button class="btn" onclick="setTheme('#a855f7')">Purple</button>
</div>

<div class="setting">
<h4>Particles</h4>
<button class="btn" onclick="setParticles(true)">On</button>
<button class="btn" onclick="setParticles(false)">Off</button>
</div>

<div class="setting">
<h4>Music</h4>
<button class="btn" onclick="toggleMusic()">Play / Pause</button>
<input type="range" id="vol" min="0" max="100" value="50">
</div>

<div class="setting">
<h4>Tab Cloak</h4>
<button class="btn" onclick="cloak('google')">Google</button>
<button class="btn" onclick="cloak('drive')">Drive</button>
<button class="btn" onclick="cloak('none')">None</button>
</div>

<br>
<button class="btn" onclick="closeSettings()">Close</button>

</div>
</div>

<audio id="music" loop src="./bgmusic.mp3"></audio>

<script>
const SID="1";

/* FIXED GAMEPIX FETCH */
async function loadGames(){
    try{
        const res = await fetch(
        `https://feeds.gamepix.com/v2/json?sid=${SID}&pagination=48`
        );

        const data = await res.json();

        if(!data.items){
            console.error("GamePix returned bad data", data);
            return;
        }

        const grid=document.getElementById("arcade");

        data.items.forEach(g=>{
            const c=document.createElement("div");
            c.className="card";
            c.dataset.title=g.title.toLowerCase();

            c.onclick=()=>{
                document.getElementById("gameview").style.display="flex";
                document.getElementById("frame").src=
                `https://play.gamepix.com/${g.namespace}/embed?sid=${SID}`;
            };

            c.innerHTML=`<img src="${g.banner_image}"><h3>${g.title}</h3>`;
            grid.appendChild(c);
        });

        document.getElementById("loader").style.display="none";

    }catch(e){
        console.error(e);
    }
}

/* SEARCH */
function filterGames(){
    let q=search.value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display=c.dataset.title?.includes(q)?"block":"none";
    });
}

/* NAV */
function showView(v){
    document.getElementById("arcade").style.display=v==="arcade"?"grid":"none";
    document.getElementById("partners").style.display=v==="partners"?"grid":"none";
}

/* GAME */
function closeGame(){
    gameview.style.display="none";
    frame.src="";
}

/* SETTINGS */
function openSettings(){modal.style.display="flex";}
function closeSettings(){modal.style.display="none";}

/* THEME */
function setTheme(c){
    document.documentElement.style.setProperty("--accent",c);
}

/* PARTICLES */
function setParticles(on){
    const p=document.getElementById("particles");
    p.innerHTML="";
    if(!on) return;

    for(let i=0;i<120;i++){
        let d=document.createElement("div");
        d.className="particle";
        d.style.left=Math.random()*100+"%";
        d.style.animationDuration=(Math.random()*3+2)+"s";
        p.appendChild(d);
    }
}

/* MUSIC */
const music=document.getElementById("music");
const vol=document.getElementById("vol");

vol.oninput=()=>music.volume=vol.value/100;

function toggleMusic(){
    if(music.paused) music.play().catch(()=>{});
    else music.pause();
}

/* CLOAK */
function cloak(type){
    if(type==="google"){
        document.title="Google";
    }else if(type==="drive"){
        document.title="My Drive";
    }else{
        document.title="The Vault";
    }
}

/* INIT */
loadGames();
setParticles(true);
</script>

</body>
</html>
