<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault</title>

<link id="tab-favicon" rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_drive_2020q4.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050507;
    --card-bg: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #6366f1;
    --text: #fff;
}

body {
    margin:0;
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at top,#0a0a12,#050507);
    color:var(--text);
}

/* NAV */
.glass-nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 5%;
    background:rgba(10,10,12,0.7);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:1000;
}

h1 {
    font-size:1.2rem;
    cursor:pointer;
    background:linear-gradient(90deg,#fff,var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#game-search {
    width:300px;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    color:white;
}

#game-search:focus {
    outline:none;
    border-color:var(--accent);
}

.icon-btn {
    background:none;
    border:1px solid var(--border);
    border-radius:10px;
    padding:6px 10px;
    color:white;
    cursor:pointer;
}

/* GRID */
.game-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:30px 5%;
}

.game-card {
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.game-card:hover {
    transform:translateY(-5px);
    border-color:var(--accent);
}

.game-card img {
    width:100%;
    height:130px;
    object-fit:cover;
}

.game-info {
    padding:10px;
}

/* GAME VIEW */
#game-view {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    display:none;
    flex-direction:column;
    z-index:5000;
}

.game-header {
    padding:10px;
    display:flex;
    gap:10px;
    background:#050507;
}

.game-header button {
    background:var(--accent);
    border:none;
    padding:6px 12px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

#iframe-container {
    flex:1;
}

/* MODAL */
#settings-modal {
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    background:#111;
    padding:20px;
    border-radius:15px;
    border:1px solid var(--border);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    z-index:2000;
}

#settings-modal.active {
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
    pointer-events:all;
}

#modal-overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:1999;
}

button {
    margin-top:5px;
}
</style>
</head>

<body>

<nav class="glass-nav">
    <h1 onclick="location.reload()">The Vault</h1>
    <input id="game-search" placeholder="Search..." oninput="filterGames()">
    <button class="icon-btn" onclick="toggleSettings(true)">⚙️</button>
</nav>

<div class="game-grid" id="arcade-grid"></div>
<div id="sentinel"></div>

<!-- GAME VIEW -->
<div id="game-view">
    <div class="game-header">
        <button onclick="closeGame()">← Back</button>
        <h3 id="game-title"></h3>
    </div>
    <div id="iframe-container"></div>
</div>

<!-- SETTINGS -->
<div id="modal-overlay" onclick="toggleSettings(false)"></div>

<div id="settings-modal">
    <h3>Settings</h3>

    <label>Music</label><br>
    <button onclick="toggleMusic()">Play / Pause</button>
    <br><br>

    <label>Volume</label><br>
    <input type="range" id="volume" min="0" max="100" value="50">

    <br><br>
    <button onclick="toggleSettings(false)">Close</button>
</div>

<audio id="music" loop src="./bgmusic.mp3"></audio>

<script>
const SID = "1";
let next = `https://feeds.gamepix.com/v2/json?order=quality&pagination=24&sid=${SID}`;

const grid = document.getElementById("arcade-grid");

/* LOAD GAMES */
async function loadGames() {
    const res = await fetch(next);
    const data = await res.json();

    data.items.forEach(g => {
        const card = document.createElement("div");
        card.className = "game-card";
        card.setAttribute("data-title", g.title.toLowerCase());

        card.onclick = () => {
            document.getElementById("game-title").textContent = g.title;
            document.getElementById("iframe-container").innerHTML =
                `<iframe src="https://play.gamepix.com/${g.namespace}/embed?sid=${SID}" style="width:100%;height:100%;border:none;"></iframe>`;
            document.getElementById("game-view").style.display = "flex";
        };

        card.innerHTML = `
            <img src="${g.banner_image}">
            <div class="game-info"><h4>${g.title}</h4></div>
        `;

        grid.appendChild(card);
    });

    next = data.next_url;
}

/* SEARCH */
function filterGames() {
    const q = document.getElementById("game-search").value.toLowerCase();
    document.querySelectorAll(".game-card").forEach(c=>{
        c.style.display = c.dataset.title.includes(q) ? "block":"none";
    });
}

/* GAME VIEW */
function closeGame() {
    document.getElementById("game-view").style.display = "none";
    document.getElementById("iframe-container").innerHTML = "";
}

/* SETTINGS */
function toggleSettings(open) {
    document.getElementById("settings-modal").classList.toggle("active", open);
    document.getElementById("modal-overlay").style.display = open ? "block":"none";
}

/* MUSIC */
const music = document.getElementById("music");
const volume = document.getElementById("volume");

volume.oninput = () => {
    music.volume = volume.value / 100;
};

function toggleMusic() {
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}

/* USER INTERACTION FIX (IMPORTANT) */
document.addEventListener("click", () => {
    music.volume = volume.value / 100;
}, { once:true });

/* SCROLL LOAD */
const observer = new IntersectionObserver(e=>{
    if(e[0].isIntersecting) loadGames();
});
observer.observe(document.getElementById("sentinel"));

/* INIT */
loadGames();
</script>

</body>
</html>
