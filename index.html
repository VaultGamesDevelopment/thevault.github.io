<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Vault</title>

<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<div id="weather"></div>

<header>
    <div class="logo" onclick="showPage('home')">THE VAULT</div>

    <nav>
        <button onclick="showPage('home')">Arcade</button>
        <button onclick="showPage('partners')">Partners</button>
    </nav>

    <input id="search" placeholder="Search games..." oninput="filterGames()">

    <button onclick="toggleSettings()">⚙</button>
</header>

<!-- HOME -->
<section id="home" class="page active">
    <div id="games" class="grid"></div>
</section>

<!-- PARTNERS -->
<section id="partners" class="page">
    <div class="grid small">
        <a class="partner" href="https://gamepix.com" target="_blank">GamePix</a>
        <a class="partner" href="https://sites.google.com/view/jaimescheesegrater" target="_blank">Cheese Grater</a>
    </div>
</section>

<!-- GAME VIEW -->
<div id="gameView">
    <button onclick="closeGame()">← Exit</button>
    <div id="frame"></div>
</div>

<!-- SETTINGS -->
<div id="settings">
    <h3>Settings</h3>

    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('midnight')">Midnight</button>
    <button onclick="setTheme('forest')">Forest</button>
    <button onclick="setTheme('crimson')">Crimson</button>

    <hr>

    <button onclick="setWeather('rain')">Rain</button>
    <button onclick="setWeather('snow')">Snow</button>
    <button onclick="setWeather('stars')">Stars</button>
    <button onclick="setWeather('none')">Clear</button>

    <hr>

    <button onclick="toggleMusic()">Music</button>
    <button onclick="toggleSettings()">Close</button>
</div>

<audio id="music" loop src="bgmusic.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
