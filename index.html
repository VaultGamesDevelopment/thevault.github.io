<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="star-field"></div>

    <nav class="glass-nav">
        <h1>The Vault</h1>
        <div class="search-container">
            <input type="text" id="game-search" placeholder="Search games..." oninput="universalFilter()">
        </div>
        <div class="nav-links">
            <span class="badge">Arcade</span>
            <button class="settings-trigger" onclick="toggleSettings(true)">⚙️</button>
        </div>
    </nav>

    <main>
        <section id="view-arcade" class="active">
            <div class="game-grid" id="arcade-grid">
                </div>
            <div id="sentinel"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
