<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault X Pro</title>

<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
--accent:#7c3aed;
--bg:#0a0f1c;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Inter,system-ui;
}

.bg{
position:fixed;
inset:0;
z-index:-2;
background: radial-gradient(circle at 20% 20%, #7c3aed33, transparent 40%),
            radial-gradient(circle at 80% 80%, #06b6d433, transparent 40%);
}

/* CARDS */
.card{
aspect-ratio:1/1;
border-radius:16px;
overflow:hidden;
position:relative;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(124,58,237,0.4);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
position:absolute;
bottom:0;
width:100%;
padding:6px;
font-size:12px;
background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* SKELETON */
.skeleton{
background:linear-gradient(90deg,#222,#333,#222);
background-size:200% 100%;
animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

/* PANEL */
.panel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
transform:translateX(100%);
transition:0.3s;
z-index:50;
}

.panel.open{
transform:translateX(0);
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
inset:0;
z-index:100;
}

/* BUTTON */
.btn{
background:var(--accent);
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

/* FAVORITES PANEL */
.fav-panel{
position:fixed;
left:0;
top:0;
width:260px;
height:100%;
transform:translateX(-100%);
transition:0.3s;
z-index:50;
}

.fav-panel.open{
transform:translateX(0);
}
</style>
</head>

<body>

<div class="bg"></div>

<div x-data="app()" x-init="init()">

<header class="flex justify-between p-4">
<h1 class="font-bold text-lg">Vault X Pro</h1>

<div class="flex gap-2">
<button class="btn" @click="toggleFavs()">⭐ Favorites</button>
<button class="btn" @click="togglePanel()">Settings</button>
</div>
</header>

<!-- SEARCH -->
<div class="p-4">
<input class="w-full p-2 rounded text-black" placeholder="Search..." x-model="search" @input="filterGames()">
</div>

<!-- TABS -->
<div class="p-4 flex gap-2">
<button class="btn" @click="tab='local'">Local</button>
<button class="btn" @click="tab='gamepix'">Cloud</button>
<button class="btn" @click="tab='recommended'">Recommended</button>
<button class="btn" @click="tab='trending'">Trending</button>
</div>

<!-- GRID -->
<div class="p-4 grid grid-cols-2 md:grid-cols-5 gap-4">

<template x-for="g in paginatedGames()" :key="g.title">

<div class="card" @click="playGame(g)">
<img x-bind:src="g.loaded ? resolveImage(g.image) : ''"
@load="g.loaded=true"
x-show="g.loaded"
loading="lazy">

<div x-show="!g.loaded" class="card skeleton"></div>

<div class="title" x-text="g.title"></div>

<div class="absolute top-1 right-1 text-xs cursor-pointer"
@click.stop="toggleFavorite(g)">
⭐
</div>

</div>

</template>

</div>

<!-- PAGINATION -->
<div class="flex justify-center gap-2 p-4">
<button class="btn" @click="prevPage()">Prev</button>
<span x-text="page"></span>
<button class="btn" @click="nextPage()">Next</button>
</div>

<!-- GAME VIEW -->
<div x-show="showGame" class="fullscreen bg-black flex flex-col">

<div class="p-2 flex justify-between">
<button class="btn" @click="closeGame()">Exit</button>
<button class="btn" @click="toggleFullscreen()">Fullscreen</button>
<span x-text="activeGame?.title"></span>
</div>

<iframe class="flex-1 w-full" :src="resolveGameUrl(activeGame?.url)"></iframe>

</div>

<!-- SETTINGS -->
<div class="panel bg-black p-4" :class="panelOpen ? 'open':''">

<h2 class="mb-3">Settings</h2>

<label>Theme Accent</label>
<input type="color" x-model="accentColor" @input="applyAccent()" class="w-full h-10 mb-3">

<label>Items per page</label>
<select class="w-full p-2 text-black mb-3" x-model="perPage">
<option>6</option>
<option>10</option>
<option>20</option>
</select>

</div>

<!-- FAVORITES -->
<div class="fav-panel bg-black p-4" :class="favOpen ? 'open':''">

<h2 class="mb-3">Favorites</h2>

<template x-for="g in favorites" :key="g.title">
<div class="p-2 border-b cursor-pointer" @click="playGame(g)">
<span x-text="g.title"></span>
</div>
</template>

</div>

</div>

<script>
function app(){

const BASE="https://biology.science.geometry.project.computer.archivomemoria-audiovisualcsb.org/";

return{

tab:'local',
search:'',

games:[],
gamePixGames:[],
favorites:[],
favoritesMap:{},

showGame:false,
activeGame:null,

panelOpen:false,
favOpen:false,

accentColor:'#7c3aed',

page:1,
perPage:10,

init(){
this.loadFavorites();
this.fetchLocal();
this.fetchGamePix();
this.applyAccent();

document.addEventListener("keydown",(e)=>{
if(e.key==="f") this.toggleFullscreen();
if(e.key==="Escape") this.closeGame();
});
},

/* FAVORITES */
toggleFavorite(g){
if(this.favoritesMap[g.title]){
delete this.favoritesMap[g.title];
}
else{
this.favoritesMap[g.title]=g;
}
this.saveFavorites();
this.loadFavorites();
},

saveFavorites(){
localStorage.setItem("fav",JSON.stringify(this.favoritesMap));
},

loadFavorites(){
this.favoritesMap=JSON.parse(localStorage.getItem("fav")||"{}");
this.favorites=Object.values(this.favoritesMap);
},

toggleFavs(){
this.favOpen=!this.favOpen;
},

/* SETTINGS */
togglePanel(){
this.panelOpen=!this.panelOpen;
},

applyAccent(){
document.documentElement.style.setProperty('--accent',this.accentColor);
},

/* IMAGE */
resolveImage(src){
if(!src) return "https://placehold.co/300x300";
try{
return "https://images.weserv.nl/?url="+encodeURIComponent(new URL(src,BASE).href);
}catch{
return "https://placehold.co/300x300";
}
},

resolveGameUrl(url){
try{return new URL(url,BASE).href;}
catch{return url;}
},

/* DATA */
async fetchLocal(){
const res=await fetch("/g/assets/js/games.js");
const text=await res.text();
let data=[];
try{data=eval(text+"; games");}catch{}

this.games=data.map(g=>({...g,loaded:false}));
},

async fetchGamePix(){
const res=await fetch("https://feeds.gamepix.com/v2/json?order=quality&page=1&pagination=50&sid=1");
const data=await res.json();

this.gamePixGames=(data.items||[]).map(g=>({
title:g.title,
url:g.url,
image:g.banner_image||g.image,
loaded:false,
plays:Math.random()*1000
}));
},

/* SEARCH */
filterGames(){
let s=this.search.toLowerCase();
this.games=this.games.filter(g=>g.title.toLowerCase().includes(s));
},

/* AI RECOMMENDED */
recommended(){
return [...this.games]
.sort((a,b)=>(b.plays||0)-(a.plays||0))
.slice(0,10);
},

/* TRENDING */
trending(){
return [...this.gamePixGames]
.sort((a,b)=>(b.plays||0)-(a.plays||0))
.slice(0,10);
},

/* PAGINATION */
paginatedGames(){
let list=this.currentList();

let start=(this.page-1)*this.perPage;
return list.slice(start,start+this.perPage);
},

currentList(){
if(this.tab==='local') return this.games;
if(this.tab==='gamepix') return this.gamePixGames;
if(this.tab==='recommended') return this.recommended();
if(this.tab==='trending') return this.trending();
return [];
},

nextPage(){this.page++;},
prevPage(){if(this.page>1)this.page--;},

/* GAME */
playGame(g){
this.activeGame=g;
this.showGame=true;
},

closeGame(){
this.showGame=false;
},

/* FULLSCREEN */
toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}
}

}
}
</script>

</body>
</html>
