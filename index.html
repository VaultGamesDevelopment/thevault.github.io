<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #6366f1;
      --text: #e8e8e8;
      --text-dim: #777;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.55;
    }

    #app {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 8px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .brand-dot {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .brand-dot svg { width: 14px; height: 14px; color: #fff; }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }

    .nav-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 8px;
      margin: 14px 0 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      transition: color 0.15s, background 0.15s;
      margin-bottom: 1px;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--text); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .nav-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    .nav-badge {
      margin-left: auto;
      font-size: 10px;
      background: rgba(255,255,255,0.07);
      color: var(--text-dim);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
      padding-left: 8px;
    }

    /* ── MAIN ── */
    #main { flex: 1; padding: 28px 32px; min-width: 0; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .topbar-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; flex: 1; }
    .topbar-title span { color: var(--accent); transition: color 0.3s; }

    .search-wrap { position: relative; flex: 1; max-width: 300px; }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px 9px 34px;
      border-radius: var(--radius);
      outline: none;
      font-family: inherit;
      font-size: 13px;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent); }

    /* ── CATEGORIES ── */
    .cats { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }

    .cat-pill {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .cat-pill:hover { border-color: #444; color: var(--text); }
    .cat-pill.active {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }

    /* ── GAME GRID ── */
    #gameGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    #gameGrid.list {
      display: flex;
      flex-direction: column;
    }
    #gameGrid.list .game-card {
      width: 100%;
      flex-direction: row;
      align-items: flex-start;
      padding: 10px;
      margin-bottom: 8px;
    }
    #gameGrid.list .game-thumb {
      width: 120px;
      aspect-ratio: auto;
      flex-shrink: 0;
    }
    #gameGrid.list .game-info {
      padding-left: 10px;
      flex: 1;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.2s;
    }
    .game-card:hover { border-color: #444; transform: translateY(-3px); }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #gameGrid.list .game-thumb { width: 120px; aspect-ratio: auto; }

    .game-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .game-thumb-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .game-thumb-placeholder svg { width: 28px; height: 28px; color: #333; }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      background: rgba(0,0,0,0.5);
      transition: opacity 0.2s;
    }
    .game-card:hover .play-overlay { opacity: 1; }

    .play-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .play-btn svg { width: 14px; height: 14px; color: #fff; margin-left: 2px; }

    .fav-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .fav-btn svg { width: 12px; height: 12px; color: #888; transition: color 0.15s; }
    .fav-btn.active svg { color: #f59e0b; fill: #f59e0b; }

    .game-info { padding: 12px 14px; display: flex; align-items: center; gap: 6px; }
    .game-info-text { flex: 1; min-width: 0; }

    .game-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-cat { font-size: 11px; color: var(--text-dim); }

    /* Delete button for custom games */
    .game-delete {
      display: none;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .game-card.custom .game-delete { display: flex; }
    .game-delete:hover { color: #f43f5e; border-color: rgba(244,63,94,0.4); }
    .game-delete svg { width: 10px; height: 10px; }

    /* Add card style */
    .add-card {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 16px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s;
      min-height: 160px;
    }
    .add-card:hover { border-color: var(--accent); color: var(--accent); }
    .add-card svg { width: 20px; height: 20px; }

    .empty {
      grid-column: 1/-1;
      padding: 60px 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── GAME PLAYER ── */
    #frameView { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; }
    #frameView.open { display: flex; }

    .frame-bar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .frame-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .frame-back:hover { color: var(--text); border-color: #444; }
    .frame-back svg { width: 14px; height: 14px; }
    .frame-title { font-size: 13px; font-weight: 500; color: var(--text-dim); }
    .frame-controls { margin-left: auto; display: flex; gap: 8px; }
    .frame-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .frame-btn:hover { color: var(--text); border-color: #444; }
    .frame-btn svg { width: 13px; height: 13px; }
    #gameIframe { flex: 1; border: none; }

    /* ── MODALS ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(500px, 94vw);
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .modal-header h2 { font-size: 16px; font-weight: 700; }
    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .setting-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .setting-section { margin-bottom: 22px; }
    .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover { transform: scale(1.08); }
    .swatch.active { border-color: #fff; transform: scale(1.1); }
    .pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .pill:hover { color: var(--text); border-color: #444; }
    .pill.active { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
    /* Cloak grid styles ... (unchanged) */
    .cloak-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    /* Form styles ... (unchanged) */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
    .form-input {
      width: 100%;
      background: #111;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.15s, background 0.3s;
    }
    .btn-primary:hover { opacity: 0.88; }
    /* Tabs inside modal ... (unchanged) */
    .modal-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .modal-tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-bottom-color 0.15s;
    }
    .modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    /* ... (rest remains unchanged) ... */

    /* Additional styling for grid/list toggle */
    #gameGrid.list {
      display: flex;
      flex-direction: column;
    }
    #gameGrid.list .game-card {
      width: 100%;
      flex-direction: row;
      align-items: flex-start;
      padding: 10px;
      margin-bottom: 8px;
    }
    #gameGrid.list .game-thumb {
      width: 120px;
      aspect-ratio: auto;
      flex-shrink: 0;
    }
    #gameGrid.list .game-info {
      padding-left: 10px;
      flex: 1;
    }
  </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- Mobile toggle button ... (unchanged) -->
<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
  </svg>
</button>

<!-- Game player -->
<div id="frameView">
  <div class="frame-bar">
    <button class="frame-back" onclick="closeGame()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Back
    </button>
    <span class="frame-title" id="frameTitle"></span>
    <div class="frame-controls">
      <button class="frame-btn" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        Fullscreen
      </button>
    </div>
  </div>
  <iframe id="gameIframe" allowfullscreen></iframe>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
    </div>

    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab(this,'tabAppearance')">Appearance</button>
      <button class="modal-tab" onclick="switchTab(this,'tabCloak')">Tab Cloak</button>
    </div>

    <div class="tab-pane active" id="tabAppearance">
      <div class="setting-section">
        <div class="setting-label">Accent Color</div>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="setting-section">
        <div class="setting-label">Card Size</div>
        <div class="pills">
          <button class="pill" data-size="compact" onclick="setSize(this,'compact')">Compact</button>
          <button class="pill active" data-size="default" onclick="setSize(this,'default')">Default</button>
          <button class="pill" data-size="large" onclick="setSize(this,'large')">Large</button>
        </div>
      </div>
      <!-- New Settings -->
      <div class="setting-section">
        <div class="setting-label">Dark Mode</div>
        <button class="pill" id="toggleDarkMode" onclick="toggleDarkMode()">Toggle</button>
      </div>
      <div class="setting-section">
        <div class="setting-label">Game Layout</div>
        <div class="pills">
          <button class="pill" data-layout="grid" onclick="setGridLayout('grid')">Grid</button>
          <button class="pill" data-layout="list" onclick="setGridLayout('list')">List</button>
        </div>
      </div>
      <div class="setting-section">
        <div class="setting-label">Show Descriptions</div>
        <button class="pill" id="toggleDescriptions" onclick="toggleDescriptions()">Toggle</button>
      </div>
    </div>

    <div class="tab-pane" id="tabCloak">
      <!-- existing cloak options ... -->
      <div class="setting-section">
        <div class="setting-label">Particle Effects</div>
        <button class="pill" id="toggleParticles" onclick="toggleParticles()">Toggle</button>
      </div>
    </div>
  </div>
</div>

<!-- Add game modal ... (unchanged) -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add a game</h2>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="cgTitle" placeholder="e.g. Pacman" />
    </div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input class="form-input" id="cgUrl" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-input" id="cgCat">
        <option>Arcade</option>
        <option>Action</option>
        <option>Shooter</option>
        <option>Sports</option>
        <option>Puzzle</option>
        <option>Horror</option>
        <option>Other</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveCustomGame()">Add game</button>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <nav id="sidebar">
    <div class="brand">
      <div class="brand-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/>
          <line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/>
          <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.544-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>
        </svg>
      </div>
      <span class="brand-name">The Vault</span>
    </div>

    <div class="nav-label">Browse</div>
    <button class="nav-link active" id="navAll" onclick="filterNav('all',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      All Games
      <span class="nav-badge" id="totalBadge">0</span>
    </button>
    <button class="nav-link" id="navFavs" onclick="filterNav('favorites',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Favorites
      <span class="nav-badge" id="favBadge">0</span>
    </button>

    <div class="nav-label">Categories</div>
    <div id="navCats"></div>

    <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);">
      <button class="nav-link" onclick="openSettings()">

<script>
  /* ─── THEMES (unchanged) ─── */
  const THEMES = [
    { id: 'indigo', color: '#6366f1' },
    { id: 'violet', color: '#8b5cf6' },
    { id: 'rose',   color: '#f43f5e' },
    { id: 'cyan',   color: '#06b6d4' },
    { id: 'green',  color: '#10b981' },
    { id: 'amber',  color: '#f59e0b' },
  ];

  /* ─── TAB CLOAK PRESETS ─── (unchanged) */
  const CLOAK_PRESETS = [
    { id: 'none',       label: 'Off (Default)',        emoji: '🎮', title: null,                                   favicon: null },
    { id: 'classroom',  label: 'Google Classroom',     img: 'https://ssl.gstatic.com/classroom/favicon.png',        title: 'Home' },
    { id: 'drive',      label: 'Google Drive',         img: 'https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png', title: 'My Drive - Google Drive' },

    { id: 'khan',       label: 'Khan Academy',         img: 'https://cdn.kastatic.org/images/apple-touch-icon-114x114-precomposed.new.png', title: 'Khan Academy' },
    { id: 'canvas',     label: 'Canvas LMS',           img: 'https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico', title: 'Dashboard - Canvas' },
    { id: 'wikipedia',  label: 'Wikipedia',            img: 'https://en.wikipedia.org/static/favicon/wikipedia.ico', title: 'Wikipedia' },
    { id: 'quizlet',    label: 'Quizlet',              img: 'https://quizlet.com/favicon.ico',                      title: 'Quizlet' },
    { id: 'schoology',  label: 'Schoology',            img: 'https://asset-cdn.schoology.com/sites/all/themes/schoology_theme/favicon.ico', title: 'Schoology' },
  ];

  /* ─── STATE ─── (extend to include new options) */
  const state = {
    cat: 'all',
    query: '',
    theme: localStorage.getItem('vault_theme') || 'indigo',
    gridSize: localStorage.getItem('vault_grid') || 'default',
    favorites: JSON.parse(localStorage.getItem('vault_favorites') || '[]'),
    customGames: JSON.parse(localStorage.getItem('vault_custom_games') || '[]'),
    cloak: localStorage.getItem('vault_cloak') || 'none',
    darkMode: localStorage.getItem('vault_darkMode') || 'false',
    showDescriptions: localStorage.getItem('vaultDescriptions') || 'true',
    gridLayout: localStorage.getItem('vaultLayout') || 'grid',
    particlesEnabled: localStorage.getItem('vaultParticles') || 'true'
  };

  let GAMES = [];

  /* ─── loadGames function ... (unchanged) */
  // (your existing loadGames code here, unchanged)

  /* ─── render function with layout toggle support ─── */
  function render() {
    const games = filtered();
    const total = allGames().length;
    document.getElementById('totalBadge').textContent = total;
    document.getElementById('favBadge').textContent = state.favorites.length;

    // Handle description toggle
    const showDescriptions = (state.showDescriptions === 'true');

    if (!games.length) {
      document.getElementById('gameGrid').innerHTML =
        `<div class="empty">No games found${state.query ? ` for "${state.query}"` : ''}.</div>`;
      return;
    }

    const safePath = p => p.replace(/'/g, "\\'");

    const html = games.map(g => {
      const fav = state.favorites.includes(g.path);
      const sp = safePath(g.path);
      const st = g.title.replace(/'/g, "\\'");
      const thumb = g.thumb
        ? `<img src="${g.thumb}" alt="${g.title}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="game-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>`;
      const del = g.isCustom
        ? `<button class="game-delete" onclick="event.stopPropagation();deleteGame('${sp}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`
        : '';

      let cardHTML = `<div class="game-card${g.isCustom ? ' custom' : ''}" onclick="playGame('${sp}','${st}')" title="${g.desc || g.title}">`;

      if (state.gridLayout === 'list') {
        // List layout
        cardHTML += `
          <div style="display:flex; align-items:flex-start;">
            <div class="game-thumb" style="width:120px; aspect-ratio:auto;">${thumb}</div>
            <div style="flex:1; padding-left:10px;">
              <div class="game-title">${g.title}</div>`;
        if (showDescriptions) {
          cardHTML += `<div class="game-cat">${g.cat || 'Game'}</div>`;
        }
        cardHTML += `</div></div>`;
      } else {
        // Grid layout
        cardHTML += `
          <div class="game-thumb">
            ${thumb}
            <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
            <button class="fav-btn${fav ? ' active' : ''}" onclick="event.stopPropagation();toggleFav('${sp}','${st}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
          </div>
          <div class="game-info"><div class="game-info-text"><div class="game-title">${g.title}</div>`;
        if (showDescriptions) {
          cardHTML += `<div class="game-cat">${g.cat || 'Game'}</div>`;
        }
        cardHTML += `</div>${del}</div></div>`;
      }

      return cardHTML + `</div>`;
    }).join('');

    document.getElementById('gameGrid').innerHTML = html +
      `<div class="add-card" onclick="openModal('addModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Add game</div>`;
  }
  // Call applyLayout on load
  applyLayout();

  /* ─── Functions for toggle and layout control ─── */

  function applyLayout() {
    const grid = document.getElementById('gameGrid');
    if (state.gridLayout === 'list') {
      grid.classList.add('list');
    } else {
      grid.classList.remove('list');
    }
  }

  function setGridLayout(layout) {
    localStorage.setItem('vaultLayout', layout);
    state.gridLayout = layout;
    applyLayout();
    document.querySelectorAll('.pill[data-layout]').forEach(p =>
      p.classList.toggle('active', p.dataset.layout === layout)
    );
    render();
  }

  function toggleDescriptions() {
    const current = localStorage.getItem('vaultDescriptions') === 'true';
    localStorage.setItem('vaultDescriptions', (!current).toString());
    state.showDescriptions = (!current).toString();
    render();
    document.getElementById('toggleDescriptions').textContent = current ? 'Show Descriptions' : 'Hide Descriptions';
  }

  function toggleDarkMode() {
    const isDark = localStorage.getItem('vault_darkMode') === 'true';
    localStorage.setItem('vault_darkMode', (!isDark).toString());
    state.darkMode = (!isDark).toString();
    document.body.classList.toggle('dark-mode', !isDark);
    document.documentElement.style.backgroundColor = !isDark ? '#000' : '#0d0d0d';
    document.getElementById('toggleDarkMode').textContent = !isDark ? 'Disable Dark Mode' : 'Enable Dark Mode';
  }

  function toggleParticles() {
    const enabled = localStorage.getItem('vaultParticles') === 'true';
    localStorage.setItem('vaultParticles', (!enabled).toString());
    state.particlesEnabled = (!enabled).toString();
    if (enabled) {
      document.getElementById('particleCanvas').style.display = 'none';
    } else {
      document.getElementById('particleCanvas').style.display = '';
      initParticles();
    }
    document.getElementById('toggleParticles').textContent = !enabled ? 'Disable Particles' : 'Enable Particles';
  }

  /* --- Initialize toggle buttons on open --- */
  function openSettings() {
    renderSwatches();
    renderCloakGrid();
    // Set button states
    document.querySelectorAll('.pill[data-size]').forEach(p =>
      p.classList.toggle('active', p.dataset.size === state.gridSize)
    );
    document.getElementById('customCloakTitle').value = localStorage.getItem('vault_cloak_title') || '';
    document.getElementById('customCloakFavicon').value = localStorage.getItem('vault_cloak_favicon') || '';

    // Update toggle button texts
    document.getElementById('toggleDarkMode').textContent = state.darkMode === 'true' ? 'Disable Dark Mode' : 'Enable Dark Mode';
    document.getElementById('toggleDescriptions').textContent = state.showDescriptions === 'true' ? 'Hide Descriptions' : 'Show Descriptions';
    document.querySelectorAll('.pill[data-layout]').forEach(p =>
      p.classList.toggle('active', p.dataset.layout === state.gridLayout)
    );
    document.getElementById('toggleParticles').textContent = state.particlesEnabled === 'true' ? 'Disable Particles' : 'Enable Particles';

    // Apply dark mode style
    if (state.darkMode === 'true') {
      document.body.classList.add('dark-mode');
      document.documentElement.style.backgroundColor = '#000';
    } else {
      document.body.classList.remove('dark-mode');
      document.documentElement.style.backgroundColor = '#0d0d0d';
    }

    applyLayout();
    render();
    renderSwatches();
    renderCloakGrid();
    openModal('settingsModal');
  }

  /* ─── Basic modal controls ─── */
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function switchTab(btn, paneId) {
    btn.closest('.modal').querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    btn.closest('.modal').querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(paneId).classList.add('active');
  }
  document.querySelectorAll('.overlay').forEach(el =>
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
  );

  /* ─── Search input event ─── */
  document.getElementById('searchInput').addEventListener('input', e => {
    state.query = e.target.value.trim();
    render();
  });

  /* ─── Keyboard events ─── */
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (e.key === 'Escape') { closeModal('settingsModal'); closeModal('addModal'); closeGame(); }
    if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  /* ─── initParticles ─── (unchanged) */
  function initParticles() {
    if (localStorage.getItem('vaultParticles') !== 'true') {
      document.getElementById('particleCanvas').style.display = 'none';
      return;
    }
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, pts;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function spawn() {
      pts = [];
      for (let i = 0; i < 40; i++) {
        pts.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.6,
          vy: (Math.random() - 0.5) * 0.6,
          r: Math.random() * 1.8 + 0.5,
          o: Math.random() * 0.5 + 0.15,
        });
      }
    }

    let mouse = { x: -999, y: -999 };
    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function getAccentRGB() {
      const hex = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim().replace('#', '');
      return [parseInt(hex.slice(0,2),16)||99, parseInt(hex.slice(2,4),16)||102, parseInt(hex.slice(4,6),16)||241];
    }

    let lastFrame = 0;
    function draw(ts) {
      requestAnimationFrame(draw);
      if (ts - lastFrame < 25) return;
      lastFrame = ts;

      ctx.clearRect(0, 0, w, h);
      const [r,g,b] = getAccentRGB();

      for (const p of pts) {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 22500) {
          const d = Math.sqrt(d2);
          const f = (150 - d) / 150 * 0.015;
          p.vx += dx * f;
          p.vy += dy * f;
        }

        p.vx *= 0.99; p.vy *= 0.99;
        p.x += p.vx; p.y += p.vy;

        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, 6.28318);
        ctx.fillStyle = `rgba(${r},${g},${b},${p.o})`;
        ctx.fill();
      }

      ctx.lineWidth = 0.5;
      for (let i = 0; i < pts.length; i++) {
        for (let j = i+1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d2 = dx*dx + dy*dy;
          if (d2 < 16000) {
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(${r},${g},${b},${(1 - Math.sqrt(d2)/126) * 0.12})`;
            ctx.stroke();
          }
        }
      }
    }

    window.addEventListener('resize', () => { resize(); spawn(); });
    resize();
    spawn();
    requestAnimationFrame(draw);
  }

  /* ─── Initialization ─── */
  // Apply theme
  applyTheme(); // (your existing function, define next)
  // Apply grid size
  applyGridSize();
  // Initialize cloak
  initCloak();
  // Initialize particles
  initParticles();

  // Apply dark mode style
  if (localStorage.getItem('vault_darkMode') === 'true') {
    document.body.classList.add('dark-mode');
    document.documentElement.style.backgroundColor = '#000';
  } else {
    document.body.classList.remove('dark-mode');
    document.documentElement.style.backgroundColor = '#0d0d0d';
  }

  // Apply layout mode
  applyLayout();

  // Show/hide descriptions
  if (localStorage.getItem('vaultDescriptions') === 'true') {
    // descriptions visible
  } else {
    // hide descriptions (handled in render)
  }

  // Particle effects
  if (localStorage.getItem('vaultParticles') !== 'true') {
    document.getElementById('particleCanvas').style.display = 'none';
  }

  // Load games after page load
  loadGames();

  /* --- Functions for toggles and layout --- */

  function applyTheme() {
    // (your existing applyTheme code)
    const t = THEMES.find(x => x.id === (localStorage.getItem('vault_theme') || 'indigo')) || THEMES[0];
    document.documentElement.style.setProperty('--accent', t.color);
  }

  function applyGridSize() {
    const map = { compact: '150px', default: '200px', large: '260px' };
    document.getElementById('gameGrid').style.gridTemplateColumns = `repeat(auto-fill, minmax(${map[state.gridSize]}, 1fr))`;
  }

  // ---- The following functions are the key for your fix ----

  function applyLayout() {
    const grid = document.getElementById('gameGrid');
    if (state.gridLayout === 'list') {
      grid.classList.add('list');
    } else {
      grid.classList.remove('list');
    }
  }

  function setGridLayout(layout) {
    localStorage.setItem('vaultLayout', layout);
    state.gridLayout = layout;
    applyLayout();
    document.querySelectorAll('.pill[data-layout]').forEach(p =>
      p.classList.toggle('active', p.dataset.layout === layout)
    );
    render();
  }

  function toggleDescriptions() {
    const current = localStorage.getItem('vaultDescriptions') === 'true';
    localStorage.setItem('vaultDescriptions', (!current).toString());
    state.showDescriptions = (!current).toString();
    render();
    document.getElementById('toggleDescriptions').textContent = current ? 'Show Descriptions' : 'Hide Descriptions';
  }

  function toggleDarkMode() {
    const isDark = localStorage.getItem('vault_darkMode') === 'true';
    localStorage.setItem('vault_darkMode', (!isDark).toString());
    state.darkMode = (!isDark).toString();
    document.body.classList.toggle('dark-mode', !isDark);
    document.documentElement.style.backgroundColor = !isDark ? '#000' : '#0d0d0d';
    document.getElementById('toggleDarkMode').textContent = !isDark ? 'Disable Dark Mode' : 'Enable Dark Mode';
  }

  function toggleParticles() {
    const enabled = localStorage.getItem('vaultParticles') === 'true';
    localStorage.setItem('vaultParticles', (!enabled).toString());
    state.particlesEnabled = (!enabled).toString();
    if (enabled) {
      document.getElementById('particleCanvas').style.display = 'none';
    } else {
      document.getElementById('particleCanvas').style.display = '';
      initParticles();
    }
    document.getElementById('toggleParticles').textContent = !enabled ? 'Disable Particles' : 'Enable Particles';
  }

</script>
