<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #6366f1;
      --text: #e8e8e8;
      --text-dim: #777;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 8px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .brand-dot {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-dot svg {
      width: 14px;
      height: 14px;
      color: #fff;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .nav-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 8px;
      margin: 14px 0 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      transition: color 0.15s, background 0.15s;
      margin-bottom: 1px;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color: var(--text); background: color-mix(in srgb, var(--accent) 12%, transparent); }

    .nav-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    .nav-badge {
      margin-left: auto;
      font-size: 10px;
      background: rgba(255,255,255,0.07);
      color: var(--text-dim);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
      padding-left: 8px;
    }

    /* ── MAIN ── */
    #main {
      flex: 1;
      padding: 28px 32px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      flex: 1;
    }

    .topbar-title span { color: var(--accent); }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 300px;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px 9px 34px;
      border-radius: var(--radius);
      outline: none;
      font-family: inherit;
      font-size: 13px;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent); }

    /* ── CATEGORIES ── */
    .cats {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .cat-pill {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .cat-pill:hover { border-color: #444; color: var(--text); }
    .cat-pill.active {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }

    /* ── GAME GRID ── */
    #gameGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.2s;
    }

    .game-card:hover {
      border-color: #444;
      transform: translateY(-3px);
    }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .game-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .game-thumb-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .game-thumb-placeholder svg {
      width: 28px;
      height: 28px;
      color: #333;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      background: rgba(0,0,0,0.5);
      transition: opacity 0.2s;
    }

    .game-card:hover .play-overlay { opacity: 1; }

    .play-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-btn svg { width: 14px; height: 14px; color: #fff; margin-left: 2px; }

    .fav-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .fav-btn svg { width: 12px; height: 12px; color: #888; transition: color 0.15s; }
    .fav-btn.active svg { color: #f59e0b; fill: #f59e0b; }

    .game-info {
      padding: 12px 14px;
    }

    .game-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-cat {
      font-size: 11px;
      color: var(--text-dim);
    }

    .game-card.custom .game-delete {
      display: flex;
    }

    .game-delete {
      display: none;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      margin-left: auto;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .game-delete:hover { color: #f43f5e; border-color: rgba(244,63,94,0.4); }
    .game-delete svg { width: 10px; height: 10px; }

    .add-card {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 16px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s;
      min-height: 160px;
    }

    .add-card:hover { border-color: var(--accent); color: var(--accent); }
    .add-card svg { width: 20px; height: 20px; }

    .empty {
      grid-column: 1/-1;
      padding: 60px 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── GAME PLAYER ── */
    #frameView {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      flex-direction: column;
    }

    #frameView.open { display: flex; }

    .frame-bar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .frame-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }

    .frame-back:hover { color: var(--text); border-color: #444; }
    .frame-back svg { width: 14px; height: 14px; }

    .frame-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .frame-controls { margin-left: auto; display: flex; gap: 8px; }

    .frame-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }

    .frame-btn:hover { color: var(--text); border-color: #444; }
    .frame-btn svg { width: 13px; height: 13px; }

    #gameIframe { flex: 1; border: none; }

    /* ── SETTINGS MODAL ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(480px, 94vw);
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .modal-header h2 { font-size: 16px; font-weight: 700; }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    .setting-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .setting-section { margin-bottom: 22px; }

    .swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s;
    }

    .swatch:hover { transform: scale(1.08); }
    .swatch.active { border-color: #fff; transform: scale(1.1); }

    .pills { display: flex; gap: 6px; }

    .pill {
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .pill:hover { color: var(--text); border-color: #444; }
    .pill.active { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
    }

    #app { position: relative; z-index: 1; }

    /* ── ADD GAME MODAL ── */
    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .form-input {
      width: 100%;
      background: #111;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }

    /* ── MISC ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .mobile-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .mobile-toggle svg { width: 18px; height: 18px; }

    @media (max-width: 720px) {
      .mobile-toggle { display: flex; }
      #sidebar { position: fixed; left: -220px; z-index: 45; transition: left 0.25s; }
      #sidebar.open { left: 0; }
      #main { padding: 20px 16px; padding-top: 64px; }
      #gameGrid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .topbar-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- Mobile toggle -->
<canvas id="particleCanvas"></canvas>
<button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
  </svg>
</button>

<!-- Game player -->
<div id="frameView">
  <div class="frame-bar">
    <button class="frame-back" onclick="closeGame()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Back
    </button>
    <span class="frame-title" id="frameTitle"></span>
    <div class="frame-controls">
      <button class="frame-btn" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        Fullscreen
      </button>
    </div>
  </div>
  <iframe id="gameIframe" allowfullscreen></iframe>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsModal" onclick="e => { if(e.target===this) closeSettings() }">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="setting-section">
      <div class="setting-label">Accent Color</div>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="setting-section">
      <div class="setting-label">Card Size</div>
      <div class="pills">
        <button class="pill" data-size="compact" onclick="setSize(this,'compact')">Compact</button>
        <button class="pill active" data-size="default" onclick="setSize(this,'default')">Default</button>
        <button class="pill" data-size="large" onclick="setSize(this,'large')">Large</button>
      </div>
    </div>
  </div>
</div>

<!-- Add game modal -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add a game</h2>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="cgTitle" placeholder="e.g. Pacman" />
    </div>
    <div class="form-group">
      <label class="form-label">URL</label>
      <input class="form-input" id="cgUrl" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-input" id="cgCat">
        <option>Arcade</option>
        <option>Sandbox</option>
        <option>Shooter</option>
        <option>Sports</option>
        <option>Other</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveCustomGame()">Add game</button>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <nav id="sidebar">
    <div class="brand">
      <div class="brand-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/>
          <line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/>
          <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.544-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/>
        </svg>
      </div>
      <span class="brand-name">The Vault</span>
    </div>

    <div class="nav-label">Browse</div>
    <button class="nav-link active" id="navAll" onclick="filterNav('all',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      All Games
      <span class="nav-badge" id="totalBadge">0</span>
    </button>
    <button class="nav-link" id="navFavs" onclick="filterNav('favorites',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Favorites
      <span class="nav-badge" id="favBadge">0</span>
    </button>

    <div class="nav-label">Categories</div>
    <div id="navCats"></div>

    <div class="nav-label" style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);">Tools</div>
    <button class="nav-link" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>

    <div class="sidebar-footer">The Vault</div>
  </nav>

  <main id="main">
    <div class="topbar">
      <div class="topbar-title">Game <span>Library</span></div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search games..." autocomplete="off" />
      </div>
      <button class="cat-pill" onclick="playRandom()" style="border-radius: var(--radius);">🎲 Random</button>
    </div>

    <div class="cats" id="catRow"></div>
    <div id="gameGrid"></div>
  </main>
</div>

<script>
  /* ── STATE ── */
  const THEMES = [
    { id: 'indigo', color: '#6366f1' },
    { id: 'violet', color: '#8b5cf6' },
    { id: 'rose',   color: '#f43f5e' },
    { id: 'cyan',   color: '#06b6d4' },
    { id: 'green',  color: '#10b981' },
    { id: 'amber',  color: '#f59e0b' },
  ];

  const state = {
    cat: 'all',
    query: '',
    theme: localStorage.getItem('vault_theme') || 'indigo',
    gridSize: localStorage.getItem('vault_grid') || 'default',
    favorites: JSON.parse(localStorage.getItem('vault_favorites') || '[]'),
    customGames: JSON.parse(localStorage.getItem('vault_custom_games') || '[]'),
  };

  /* ── BUILT-IN GAMES ── */
  let GAMES = [
    { title: 'Minecraft',      path: './gmes/minecraft/index.html',       cat: 'Sandbox', icon: '⛏️' },
    { title: 'Geometry Dash',  path: './gmes/geometrydash/index.html',    cat: 'Arcade',  icon: '⚡' },
    { title: '1v1.LOL',        path: './gmes/1v1lol/index.html',          cat: 'Shooter', icon: '🎯' },
    { title: 'Baseball Bros',  path: './gmes/baseballbros/index.html',    cat: 'Sports',  icon: '⚾' },
  ];

  /* ── HELPERS ── */
  function allGames() { return [...GAMES, ...state.customGames]; }

  function filtered() {
    const q = state.query.toLowerCase();
    return allGames().filter(g => {
      const matchQ = !q || g.title.toLowerCase().includes(q) || (g.cat||'').toLowerCase().includes(q);
      if (state.cat === 'favorites') return matchQ && state.favorites.includes(g.path);
      const matchC = state.cat === 'all' || g.cat === state.cat;
      return matchQ && matchC;
    });
  }

  /* ── THEME ── */
  function applyTheme(id) {
    const t = THEMES.find(x => x.id === id) || THEMES[0];
    state.theme = id;
    localStorage.setItem('vault_theme', id);
    document.documentElement.style.setProperty('--accent', t.color);
    renderSwatches();
  }

  function renderSwatches() {
    document.getElementById('swatches').innerHTML = THEMES.map(t => `
      <div class="swatch ${t.id === state.theme ? 'active' : ''}"
           style="background:${t.color}"
           onclick="applyTheme('${t.id}')"></div>
    `).join('');
  }

  /* ── GRID SIZE ── */
  function setSize(el, size) {
    document.querySelectorAll('.pill[data-size]').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    state.gridSize = size;
    localStorage.setItem('vault_grid', size);
    applyGridSize();
  }

  function applyGridSize() {
    const map = { compact: '150px', default: '200px', large: '260px' };
    document.getElementById('gameGrid').style.gridTemplateColumns =
      `repeat(auto-fill, minmax(${map[state.gridSize]}, 1fr))`;
  }

  /* ── RENDER ── */
  function render() {
    const games = filtered();
    const total = allGames().length;
    document.getElementById('totalBadge').textContent = total;
    document.getElementById('favBadge').textContent = state.favorites.length;

    if (!games.length) {
      document.getElementById('gameGrid').innerHTML =
        `<div class="empty">No games found for "${state.query}"</div>`;
      return;
    }

    const html = games.map(g => {
      const fav = state.favorites.includes(g.path);
      const thumb = g.thumb
        ? `<img src="${g.thumb}" alt="${g.title}" onerror="this.style.display='none'">`
        : `<div class="game-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>`;
      const del = g.isCustom
        ? `<button class="game-delete" onclick="event.stopPropagation();deleteGame('${g.path}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`
        : '';
      return `
        <div class="game-card${g.isCustom ? ' custom' : ''}" onclick="playGame('${g.path}','${g.title}')">
          <div class="game-thumb">
            ${thumb}
            <div class="play-overlay">
              <div class="play-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
            </div>
            <button class="fav-btn ${fav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${g.path}','${g.title}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
          </div>
          <div class="game-info" style="display:flex;align-items:center;gap:6px;">
            <div style="flex:1;min-width:0">
              <div class="game-title">${g.title}</div>
              <div class="game-cat">${g.cat || 'Game'}</div>
            </div>
            ${del}
          </div>
        </div>`;
    }).join('');

    document.getElementById('gameGrid').innerHTML = html + `
      <div class="add-card" onclick="openModal('addModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Add game
      </div>`;
  }

  function renderCats() {
    const all = allGames();
    const rawCats = [...new Set(all.filter(g => g.cat).map(g => g.cat))];
    const cats = ['all', 'favorites', ...rawCats];

    document.getElementById('catRow').innerHTML = cats.map(c => {
      let label = c === 'all' ? 'All' : c === 'favorites' ? '⭐ Favorites' : c;
      let count = c === 'all' ? all.length : c === 'favorites' ? state.favorites.length : all.filter(g => g.cat === c).length;
      return `<button class="cat-pill ${state.cat === c ? 'active' : ''}" onclick="filterCat('${c}')">${label} <span style="opacity:.5;font-size:10px">${count}</span></button>`;
    }).join('');

    document.getElementById('navCats').innerHTML = rawCats.map(c => `
      <button class="nav-link" onclick="filterNav('${c}',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
        ${c}
      </button>`).join('');
  }

  /* ── FILTERING ── */
  function filterCat(cat) {
    state.cat = cat;
    renderCats();
    render();
  }

  function filterNav(cat, el) {
    document.querySelectorAll('#sidebar .nav-link').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    state.cat = cat;
    renderCats();
    render();
  }

  /* ── FAVORITES ── */
  function toggleFav(path, title) {
    const idx = state.favorites.indexOf(path);
    if (idx > -1) state.favorites.splice(idx, 1);
    else state.favorites.push(path);
    localStorage.setItem('vault_favorites', JSON.stringify(state.favorites));
    renderCats();
    render();
  }

  /* ── CUSTOM GAMES ── */
  function saveCustomGame() {
    const title = document.getElementById('cgTitle').value.trim();
    const url = document.getElementById('cgUrl').value.trim();
    const cat = document.getElementById('cgCat').value;
    if (!title || !url) return alert('Please fill in the title and URL.');
    state.customGames.push({ title, path: url, cat, isCustom: true });
    localStorage.setItem('vault_custom_games', JSON.stringify(state.customGames));
    document.getElementById('cgTitle').value = '';
    document.getElementById('cgUrl').value = '';
    closeModal('addModal');
    renderCats();
    render();
  }

  function deleteGame(path) {
    state.customGames = state.customGames.filter(g => g.path !== path);
    localStorage.setItem('vault_custom_games', JSON.stringify(state.customGames));
    renderCats();
    render();
  }

  /* ── PLAY ── */
  function playGame(path, title) {
    document.getElementById('gameIframe').src = path;
    document.getElementById('frameTitle').textContent = title;
    document.getElementById('frameView').classList.add('open');
  }

  function closeGame() {
    document.getElementById('frameView').classList.remove('open');
    document.getElementById('gameIframe').src = '';
  }

  function toggleFullscreen() {
    const el = document.getElementById('gameIframe');
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }

  function playRandom() {
    const games = allGames();
    if (!games.length) return;
    const g = games[Math.floor(Math.random() * games.length)];
    playGame(g.path, g.title);
  }

  /* ── SETTINGS ── */
  function openSettings() {
    renderSwatches();
    document.querySelectorAll('.pill[data-size]').forEach(p => {
      p.classList.toggle('active', p.dataset.size === state.gridSize);
    });
    document.getElementById('settingsModal').classList.add('open');
  }

  function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  /* ── CLOSE OVERLAYS ON OUTSIDE CLICK ── */
  document.querySelectorAll('.overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  /* ── SEARCH ── */
  document.getElementById('searchInput').addEventListener('input', e => {
    state.query = e.target.value.trim();
    render();
  });

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (e.key === 'Escape') { closeSettings(); closeModal('addModal'); closeGame(); }
    if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  /* ── AUTO-DETECT GAMES IN ./gmes/ ── */
  async function autoDetect() {
    try {
      const res = await fetch('./gmes/');
      if (!res.ok) return;
      const doc = new DOMParser().parseFromString(await res.text(), 'text/html');
      const links = [...doc.querySelectorAll('a')]
        .map(a => a.getAttribute('href'))
        .filter(h => h && h.endsWith('/') && !h.startsWith('.') && h !== '/');
      links.forEach(l => {
        const folder = l.replace(/\/$/, '');
        const title = folder.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const path = `./gmes/${folder}/index.html`;
        if (!GAMES.some(g => g.path === path)) {
          GAMES.push({ title, path, cat: 'Arcade', isCustom: false });
        }
      });
    } catch (_) {}
    renderCats();
    render();
  }

  /* ── PARTICLES ── */
  function initParticles() {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function spawn() {
      particles = [];
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.7,
          vy: (Math.random() - 0.5) * 0.7,
          size: Math.random() * 2 + 0.5,
          opacity: Math.random() * 0.5 + 0.2
        });
      }
    }

    let mouse = { x: -9999, y: -9999 };
    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    function getAccentRGB() {
      const hex = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim().replace('#','');
      return {
        r: parseInt(hex.slice(0,2), 16) || 99,
        g: parseInt(hex.slice(2,4), 16) || 102,
        b: parseInt(hex.slice(4,6), 16) || 241
      };
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      const c = getAccentRGB();
      const CONNECT = 140, REPEL = 180;

      particles.forEach(p => {
        const dx = p.x - mouse.x, dy = p.y - mouse.y;
        const d = Math.hypot(dx, dy);
        if (d < REPEL) {
          const f = (REPEL - d) / REPEL * 0.02;
          p.vx += dx * f;
          p.vy += dy * f;
        }
        p.vx *= 0.99; p.vy *= 0.99;
        p.x += p.vx; p.y += p.vy;
        if (p.x < -10) p.x = w + 10;
        if (p.x > w + 10) p.x = -10;
        if (p.y < -10) p.y = h + 10;
        if (p.y > h + 10) p.y = -10;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${p.opacity})`;
        ctx.fill();
      });

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.hypot(dx, dy);
          if (dist < CONNECT) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${c.r},${c.g},${c.b},${(1 - dist / CONNECT) * 0.15})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); spawn(); });
    resize();
    spawn();
    draw();
  }

  /* ── INIT ── */
  applyTheme(state.theme);
  applyGridSize();
  autoDetect();
  renderCats();
  render();
  initParticles();
</script>
</body>
</html>
