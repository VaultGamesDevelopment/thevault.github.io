<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Vault | IDE Arcade</title>

<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR (VS CODE STYLE) -->
<div class="sidebar">
    <div class="logo">⚡ VAULT</div>

    <div class="side-section">
        <h4>EXPLORER</h4>
        <button onclick="showView('arcade')">🎮 Arcade</button>
        <button onclick="showView('partners')">🌐 Partners</button>
        <button onclick="openSettings()">⚙ Settings</button>
    </div>

    <div class="side-section">
        <h4>STATUS</h4>
        <div class="status">● Online</div>
        <div class="status">GamePix API</div>
    </div>
</div>

<!-- MAIN APP -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <input id="search" placeholder="Search games..." oninput="filterGames()"/>
        <div class="tabs">
            <div class="tab active">Arcade</div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- GAME GRID -->
        <section id="arcade" class="view active">
            <div id="games" class="grid"></div>
        </section>

        <!-- PARTNERS -->
        <section id="partners" class="view">
            <div class="partners">
                <a class="partner" href="https://gamepix.com" target="_blank">GamePix</a>
                <a class="partner" href="https://sites.google.com/view/jaimescheesegrater" target="_blank">Jaime</a>
            </div>
        </section>

    </div>

    <!-- BOTTOM CONSOLE -->
    <div class="console">
        <span>System ready...</span>
    </div>
</div>

<!-- GAME PANEL (RIGHT EXECUTOR STYLE) -->
<div id="gamePanel">
    <button onclick="closeGame()">← Exit</button>
    <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div id="overlay" onclick="closeSettings()"></div>
<div id="settings">
    <h2>Settings</h2>

    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('neon')">Neon</button>
    <button onclick="setTheme('matrix')">Matrix</button>
    <button onclick="setTheme('sunset')">Sunset</button>

    <button onclick="setWeather('rain')">Rain</button>
    <button onclick="setWeather('snow')">Snow</button>
    <button onclick="setWeather('stars')">Stars</button>

    <button onclick="toggleMusic()">Music</button>
</div>

<audio id="music" loop>
<source src="./bgmusic.mp3"/>
</audio>

<div id="fx-stars"></div>
<div id="fx-weather"></div>

<script src="app.js"></script>
</body>
</html>
