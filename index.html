<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#050507;
    --card:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);
    --accent:#6366f1;
    --text:#fff;
}

/* base */
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* nav */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 5%;
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
}

.nav h1{
    cursor:pointer;
    font-size:18px;
}

/* search */
#search{
    padding:10px 15px;
    border-radius:10px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    color:white;
}

/* grid */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:40px 5%;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}
.card:hover{
    transform:translateY(-5px);
    border-color:var(--accent);
}

.card img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

/* views */
.view{display:none;}
.view.active{display:block;}

/* game */
#game-view{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    z-index:999;
}
#game-view iframe{
    width:100%;
    height:100%;
    border:none;
}

/* modal */
#settings,#overlay{
    display:none;
    position:fixed;
}
#overlay{
    inset:0;
    background:rgba(0,0,0,.7);
}
#settings{
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:25px;
    border-radius:15px;
    z-index:1000;
}
button{cursor:pointer;}
</style>
</head>

<body>

<div class="nav">
    <h1 onclick="showView('arcade')">THE VAULT</h1>

    <input id="search" placeholder="Search..." oninput="filterGames()">

    <div>
        <button onclick="showView('arcade')">Arcade</button>
        <button onclick="showView('cdn')">Archive</button>
        <button onclick="showView('partners')">Partners</button>
        <button onclick="toggleSettings(true)">⚙️</button>
    </div>
</div>

<!-- arcade -->
<div id="arcade" class="view active">
    <div class="grid" id="arcade-grid"></div>
</div>

<!-- cdn -->
<div id="cdn" class="view">
    <div class="grid" id="cdn-grid"></div>
</div>

<!-- partners -->
<div id="partners" class="view">
    <div class="grid">
        <div class="card">
            <img src="https://www.gamepix.com/icons/favicon-96x96.png">
            <div style="padding:10px">GamePix</div>
        </div>
    </div>
</div>

<!-- game -->
<div id="game-view">
    <button onclick="closeGame()" style="position:absolute;z-index:10">← Back</button>
    <iframe id="frame"></iframe>
</div>

<!-- settings -->
<div id="overlay" onclick="toggleSettings(false)"></div>
<div id="settings">
    <h3>Settings</h3>

    <button onclick="toggleMusic()">Play / Pause Music</button><br><br>
    <input type="range" id="vol" min="0" max="100">

    <br><br>
    <button onclick="toggleSettings(false)">Close</button>
</div>

<audio id="music" loop src="bgmusic.mp3"></audio>

<script>
let next = "https://feeds.gamepix.com/v2/json?pagination=24";

/* navigation FIX */
function showView(v){
    document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));
    document.getElementById(v).classList.add("active");
}

/* arcade */
async function loadArcade(){
    let res = await fetch(next);
    let data = await res.json();

    let grid = document.getElementById("arcade-grid");

    data.items.forEach(g=>{
        let el=document.createElement("div");
        el.className="card";
        el.setAttribute("data",g.title.toLowerCase());

        el.onclick=()=>{
            openGame(`https://play.gamepix.com/${g.namespace}/embed`);
        };

        el.innerHTML=`
            <img src="${g.banner_image}">
            <div style="padding:10px">${g.title}</div>
        `;
        grid.appendChild(el);
    });

    next=data.next_url;
}

/* CDN loader (your system) */
async function loadCDN(){
    let res = await fetch("gamer.json");
    let data = await res.json();

    let grid=document.getElementById("cdn-grid");

    data.forEach(g=>{
        let el=document.createElement("div");
        el.className="card";
        el.setAttribute("data",g.name.toLowerCase());

        el.onclick=()=>openGame(g.url);

        el.innerHTML=`
            <img src="${g.image}">
            <div style="padding:10px">${g.name}</div>
        `;
        grid.appendChild(el);
    });
}

/* open game (FIXED for CDN HTML) */
function openGame(url){
    document.getElementById("game-view").style.display="block";
    document.getElementById("frame").src=url;
}

function closeGame(){
    document.getElementById("game-view").style.display="none";
    document.getElementById("frame").src="";
}

/* search */
function filterGames(){
    let q=document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.getAttribute("data").includes(q) ? "block":"none";
    });
}

/* settings */
function toggleSettings(s){
    document.getElementById("settings").style.display=s?"block":"none";
    document.getElementById("overlay").style.display=s?"block":"none";
}

/* music FIX */
const music=document.getElementById("music");
const vol=document.getElementById("vol");

vol.oninput=()=>{
    music.volume=vol.value/100;
};

function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* init */
loadArcade();
loadCDN();
</script>

</body>
</html>
