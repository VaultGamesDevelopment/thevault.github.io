<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault Games v2</title>

  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

  <div id="weather-bg"></div>

  <header class="topbar">
    <div class="logo">Vault Games v2</div>
    <div class="actions">
      <button onclick="openSettings()">Settings</button>
      <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>
  </header>

  <main id="gameContainer"></main>

  <!-- SETTINGS MODAL -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <h2>Settings</h2>

      <label>Theme</label>
      <select id="themeSelect"></select>

      <label>Weather</label>
      <select id="weatherSelect"></select>

      <label>Tab Cloak</label>
      <select id="cloakSelect"></select>

      <label>UI Density</label>
      <select id="densitySelect">
        <option value="comfortable">Comfortable</option>
        <option value="compact">Compact</option>
      </select>

      <label>Animations</label>
      <select id="animationSelect">
        <option value="on">On</option>
        <option value="off">Off</option>
      </select>

      <button onclick="applySettings()">Apply</button>
      <button onclick="closeSettings()">Close</button>
    </div>
  </div>

  <script src="./games.js"></script>
  <script src="./ui.js"></script>
  <script src="./settings.js"></script>
  <script src="./app.js"></script>

</body>
</html>
