<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="weatherFx" class="weather-bg"></div>

<header class="header">
  <h1>VAULT</h1>

  <input id="searchInput" placeholder="Search games...">

  <button class="btn-ghost" onclick="openSettings()">⚙️</button>
</header>

<main id="gameGrid" class="grid"></main>

<div id="favorites" class="sidebar"></div>

<!-- GAME VIEW -->
<div id="gameViewer" class="game-viewer">
  <div class="topbar">
    <button class="btn-danger" onclick="closeGame()">EXIT</button>
    <button class="btn" onclick="toggleFullscreen()">FULLSCREEN</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<!-- SETTINGS -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3>PREFERENCES</h3>

    <label>Theme</label>
    <select id="themeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="ocean">Ocean</option>
      <option value="fire">Fire</option>
    </select>

    <label>Weather</label>
    <select id="weatherSelect">
      <option value="none">Off</option>
      <option value="rain">Rain</option>
      <option value="snow">Snow</option>
      <option value="stars">Stars</option>
    </select>

    <label>Cloak</label>
    <select id="cloakSelect">
      <option value="none">Off</option>
      <option value="about">Google Classroom</option>
      <option value="blob">Google Docs</option>
    </select>

    <button class="btn" onclick="applySettings()">Apply</button>
  </div>
</div>

<script src="games.js"></script>
<script src="state.js"></script>
<script src="components.js"></script>
<script src="ui.js"></script>
<script src="settings.js"></script>
<script src="app.js"></script>

</body>
</html>
