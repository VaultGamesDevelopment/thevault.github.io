<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault | Premium Arcade</title>

<link rel="icon" href="/favicon-96x96.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color:#050505; --text-color:#fff; --accent-color:#3b82f6;
    --card-bg:#0f0f0f; --border-color:#262626;
    --nav-bg:rgba(5,5,5,.8); --secondary-text:#a3a3a3;
}

[data-theme="midnight"] {--bg-color:#020617;--card-bg:#0f172a;--accent-color:#38bdf8;}
[data-theme="space"] {--bg-color:#020205;--card-bg:#090915;--accent-color:#a855f7;}
[data-theme="rose"] {--bg-color:#1a0f14;--card-bg:#2d1a22;--accent-color:#fb7185;}
[data-theme="gold"] {--bg-color:#0a0a05;--card-bg:#1c1917;--accent-color:#eab308;}
[data-theme="uv"] {--bg-color:#0f0720;--card-bg:#1c1033;--accent-color:#22d3ee;}

body {margin:0;font-family:Inter;background:var(--bg-color);color:var(--text-color);}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:1rem 5%;position:sticky;top:0;
background:var(--nav-bg);backdrop-filter:blur(20px);
border-bottom:1px solid var(--border-color);
}
nav{display:flex;gap:20px}
nav a{cursor:pointer;color:var(--secondary-text);font-size:.8rem}
nav a.active{color:#fff}
.logo{font-weight:800;cursor:pointer}

#game-search{
padding:10px;border-radius:10px;
background:#111;border:1px solid var(--border-color);
color:#fff;
}

/* GRID */
.view-section{display:none;padding:2rem 5%}
.view-section.active{display:block}

.grid-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.game-card{
background:var(--card-bg);
border:1px solid var(--border-color);
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}
.game-card:hover{
transform:translateY(-4px);
border-color:var(--accent-color);
}

.game-card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.game-info{text-align:center;padding:10px}

/* SETTINGS */
#settings-modal{
display:none;position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:var(--card-bg);
padding:25px;border-radius:16px;
z-index:1000;width:90%;max-width:400px;
}
.modal-overlay{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.8);
z-index:999;
}
.btn-row{display:flex;flex-wrap:wrap;gap:8px}
.opt-btn{
padding:8px 12px;border-radius:8px;
border:1px solid var(--border-color);
background:#111;color:#fff;cursor:pointer;
}

/* GAME VIEW */
#game-view{
display:none;position:fixed;inset:0;
background:#000;z-index:2000;
}
</style>
</head>

<body>

<header>
<div class="logo" onclick="showView('home')">THE VAULT</div>

<nav>
<a id="nav-home" class="active" onclick="showView('home')">Arcade</a>
<a id="nav-cdn" onclick="showView('cdn')">Archive</a>
</nav>

<input id="game-search" placeholder="Search..." onkeyup="universalFilter()">

<button class="opt-btn" onclick="toggleSettings(true)">Settings</button>
</header>

<!-- HOME -->
<section id="view-home" class="view-section active">
<div class="grid-container" id="arcade-grid"></div>
<div id="sentinel"></div>
</section>

<!-- CDN -->
<section id="view-cdn" class="view-section">
<div class="grid-container" id="cdn-grid"></div>
</section>

<!-- SETTINGS -->
<div class="modal-overlay" id="modal-overlay" onclick="toggleSettings(false)"></div>

<div id="settings-modal">
<h3>Settings</h3>

<div>
<p>Theme</p>
<div class="btn-row">
<button class="opt-btn" onclick="setTheme('dark')">Dark</button>
<button class="opt-btn" onclick="setTheme('midnight')">Midnight</button>
<button class="opt-btn" onclick="setTheme('space')">Space</button>
</div>
</div>

<div>
<p>Cloak</p>
<div class="btn-row">
<button class="opt-btn" onclick="setCloak('none')">None</button>
<button class="opt-btn" onclick="setCloak('google')">Google</button>
<button class="opt-btn" onclick="setCloak('drive')">Drive</button>
<button class="opt-btn" onclick="setCloak('classroom')">Classroom</button>
</div>
</div>

<button style="margin-top:15px;width:100%" onclick="toggleSettings(false)">Close</button>
</div>

<!-- GAME VIEW -->
<div id="game-view">
<button onclick="closeGame()">EXIT</button>
<div id="iframe-container" style="width:100%;height:100%"></div>
</div>

<script>
const SID="1";
let arcadeNextUrl=`https://feeds.gamepix.com/v2/json?pagination=48&sid=${SID}`;
let isLoading=false;

function showView(v){
document.querySelectorAll('.view-section').forEach(s=>s.classList.remove('active'));
document.getElementById(`view-${v}`).classList.add('active');
}

async function fetchArcade(){
if(isLoading||!arcadeNextUrl)return;
isLoading=true;

let res=await fetch(arcadeNextUrl);
let data=await res.json();

const grid=document.getElementById('arcade-grid');

data.items.forEach(item=>{
let card=document.createElement('div');
card.className='game-card';
card.setAttribute('data-title',item.title.toLowerCase());

card.onclick=()=>launchArcade(item);

card.innerHTML=`
<img src="${item.banner_image}">
<div class="game-info"><h4>${item.title}</h4></div>
`;

grid.appendChild(card);
});

arcadeNextUrl=data.next_url;
isLoading=false;
}

function launchArcade(item){
document.getElementById('iframe-container').innerHTML=
`<iframe src="https://play.gamepix.com/${item.namespace}/embed?sid=${SID}" style="width:100%;height:100%;border:none;"></iframe>`;
document.getElementById('game-view').style.display='block';
}

function closeGame(){
document.getElementById('game-view').style.display='none';
}

function universalFilter(){
let q=document.getElementById('game-search').value.toLowerCase();
document.querySelectorAll('.game-card').forEach(c=>{
c.style.display=c.dataset.title.includes(q)?'block':'none';
});
}

function toggleSettings(s){
document.getElementById('settings-modal').style.display=s?'block':'none';
document.getElementById('modal-overlay').style.display=s?'block':'none';
}

function setTheme(t){
document.documentElement.setAttribute('data-theme',t);
}

function setCloak(type){
const presets={
google:{t:"Google",i:"https://www.google.com/favicon.ico"},
drive:{t:"Drive",i:"https://ssl.gstatic.com/images/branding/product/1x/drive_48dp.png"},
classroom:{t:"Classes",i:"https://ssl.gstatic.com/classroom/favicon.png"},
none:{t:"The Vault",i:"/favicon-96x96.png"}
};
document.title=presets[type].t;
document.querySelector("link[rel='icon']").href=presets[type].i;
}

const observer=new IntersectionObserver(e=>{
if(e[0].isIntersecting)fetchArcade();
});
observer.observe(document.getElementById('sentinel'));

fetchArcade();
</script>

</body>
</html>
