<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">The Vault | Premium Arcade</title>
    
    <link id="tab-favicon" rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="The Vault" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505; --text-color: #ffffff; --accent-color: #3b82f6;
            --card-bg: #0f0f0f; --border-color: #262626; --nav-bg: rgba(5, 5, 5, 0.8);
            --secondary-text: #a3a3a3; --glass: rgba(255, 255, 255, 0.03);
        }

        /* Themes */
        [data-theme="light"] { --bg-color: #f5f5f5; --text-color: #171717; --card-bg: #ffffff; --border-color: #e5e5e5; --nav-bg: rgba(245, 245, 245, 0.8); --secondary-text: #737373; }
        [data-theme="midnight"] { --bg-color: #020617; --text-color: #f1f5f9; --card-bg: #0f172a; --border-color: #1e293b; --accent-color: #38bdf8; --secondary-text: #94a3b8; }
        [data-theme="forest"] { --bg-color: #052e16; --text-color: #f0fdf4; --card-bg: #064e3b; --border-color: #065f46; --accent-color: #4ade80; --secondary-text: #a7f3d0; }
        [data-theme="crimson"] { --bg-color: #450a0a; --text-color: #fef2f2; --card-bg: #7f1d1d; --border-color: #991b1b; --accent-color: #f87171; --secondary-text: #fca5a5; }
        [data-theme="space"] { --bg-color: #020205; --text-color: #e2e8f0; --card-bg: #090915; --border-color: #1e1b4b; --accent-color: #a855f7; --secondary-text: #94a3b8; }
        [data-theme="rose"] { --bg-color: #1a0f14; --text-color: #fff1f2; --card-bg: #2d1a22; --border-color: #4c1d2f; --accent-color: #fb7185; --secondary-text: #fda4af; }
        [data-theme="gold"] { --bg-color: #0a0a05; --text-color: #fafaf9; --card-bg: #1c1917; --border-color: #44403c; --accent-color: #eab308; --secondary-text: #d6d3d1; }
        [data-theme="uv"] { --bg-color: #0f0720; --text-color: #f5f3ff; --card-bg: #1c1033; --border-color: #3b0764; --accent-color: #22d3ee; --secondary-text: #a78bfa; }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: all 0.4s ease; overflow-x: hidden; }
        header { position: sticky; top: 0; padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; background: var(--nav-bg); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid var(--border-color); }
        .logo { font-weight: 800; font-size: 1.2rem; cursor: pointer; letter-spacing: -0.05em; }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--secondary-text); text-decoration: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        nav a.active { color: var(--text-color); }
        .search-container { flex-grow: 1; max-width: 300px; margin: 0 20px; }
        #game-search { width: 100%; padding: 12px 20px; background: var(--glass); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-color); outline: none; }
        
        .view-section { display: none; padding: 2.5rem 5%; position: relative; z-index: 2; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; }
        .game-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent-color); box-shadow: 0 10px 20px -5px var(--accent-color); }
        .game-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .game-info { padding: 12px; text-align: center; }
        .game-info h3 { margin: 0; font-size: 0.8rem; font-weight: 600; }
        .game-author { font-size: 0.65rem; color: var(--secondary-text); margin-top: 4px; display: block; }

        /* Partner Cards */
        .partner-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 32px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; transition: 0.3s; }
        .p-icon { width: 80px; height: 80px; border-radius: 20px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border-color); }
        .p-icon img { width: 100%; height: 100%; object-fit: cover; }
        .partner-link { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent-color); color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 800; }

        /* Stars & Weather */
        #star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0; transition: 1s; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        #weather-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .weather-item { position: absolute; top: -50px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .weather-item.snow { width: 6px; height: 6px; background: #fff; border-radius: 50%; filter: blur(1px); opacity: 0.8; }

        /* Settings */
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 35px; border-radius: 24px; z-index: 1000; width: 90%; max-width: 450px; border: 1px solid var(--border-color); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(10px); }
        .setting-section { margin-bottom: 25px; }
        .setting-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--secondary-text); margin-bottom: 12px; display: block; }
        .opt-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--glass); color: var(--text-color); cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        input[type="range"] { width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="star-field"></div>
    <div id="weather-overlay"></div>

    <header>
        <div class="logo" onclick="showView('home')">THE VAULT</div>
        <nav>
            <a onclick="showView('home')" id="nav-home" class="active">Arcade</a>
            <a onclick="showView('cdn')" id="nav-cdn">Archive</a>
            <a onclick="showView('partners')" id="nav-partners">Partners</a>
        </nav>
        <div class="search-container">
            <input type="text" id="game-search" placeholder="Search archive..." onkeyup="universalFilter()">
        </div>
        <button class="opt-btn" onclick="toggleSettings(true)" style="border-radius:30px; padding: 8px 20px;">Settings</button>
    </header>

    <section id="view-home" class="view-section active"><div class="grid-container" id="arcade-grid"></div><div id="sentinel"></div></section>
    
    <section id="view-cdn" class="view-section"><div class="grid-container" id="cdn-grid"></div></section>

    <section id="view-partners" class="view-section">
        <div class="grid-container" style="justify-content: center; max-width: 1000px; margin: 0 auto; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
            <div class="partner-card">
                <div class="p-icon"><img src="https://www.gamepix.com/icons/favicon-96x96.png"></div>
                <h3>GamePix</h3>
                <p>Global provider of high-quality HTML5 games.</p>
                <a href="https://www.gamepix.com" target="_blank" class="partner-link">Official Site</a>
            </div>
            <div class="partner-card">
                <div class="p-icon"><img src="https://lh3.googleusercontent.com/sitesv/APaQ0SRJ4NySTKsMA0jix0YnzwZLJ5dP6raGdFI8Z_Fx3UNCBpyYnwKCO8Xmvh8uGtwy2P81m_3__KUdLWhaDfrGp8vKciWKyQ2pjnVhVW9HLOaUzXFCKxsAF3WMGZrGHnCVD7KhfGLqJkE-7oGN7P_HlcYVcAwWDjAIk2gpkrnDwKeM4EbXpvgq2lxiQcQ=w16383"></div>
                <h3>Jaime's Cheese Grater</h3>
                <p>A curated collection of unique web experiences.</p>
                <a href="https://sites.google.com/view/jaimescheesegrater" target="_blank" class="partner-link">Visit Site</a>
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="modal-overlay" onclick="toggleSettings(false)"></div>
    <div id="settings-modal">
        <h2 style="margin: 0 0 30px 0;">System Preferences</h2>
        
        <div class="setting-section">
            <span class="setting-title">Cloak Protocol</span>
            <div style="display:flex; gap:5px;"><button class="opt-btn" onclick="setCloak('none')">None</button><button class="opt-btn" onclick="setCloak('google')">Google</button><button class="opt-btn" onclick="setCloak('drive')">Drive</button><button class="opt-btn" onclick="setCloak('classroom')">Classroom</button></div>
        </div>

        <div class="setting-section">
            <span class="setting-title">Appearance</span>
            <div style="display:flex; flex-wrap:wrap; gap:5px;"><button class="opt-btn" onclick="setTheme('dark')">Dark</button><button class="opt-btn" onclick="setTheme('midnight')">Midnight</button><button class="opt-btn" onclick="setTheme('forest')">Forest</button><button class="opt-btn" onclick="setTheme('crimson')">Crimson</button><button class="opt-btn" onclick="setTheme('space')">Space</button><button class="opt-btn" onclick="setTheme('uv')">UV</button><button class="opt-btn" onclick="setTheme('gold')">Gold</button></div>
        </div>

        <div class="setting-section">
            <span class="setting-title">Atmosphere</span>
            <div style="display:flex; gap:5px;"><button class="opt-btn" onclick="setWeather('none')">None</button><button class="opt-btn" onclick="setWeather('rain')">Rain</button><button class="opt-btn" onclick="setWeather('snow')">Snow</button><button class="opt-btn" onclick="setWeather('stars')">Stars</button></div>
        </div>

        <div class="setting-section">
            <span class="setting-title">Background Music</span>
            <button class="opt-btn" onclick="toggleMusic()">Play / Pause</button>
            <input type="range" id="music-volume" min="0" max="100" value="50">
        </div>

        <button style="width:100%; padding:15px; border-radius:12px; background:var(--text-color); color:var(--bg-color); font-weight:800; border:none;" onclick="toggleSettings(false)">Apply & Exit</button>
    </div>

    <div id="game-view"><button style="position:absolute; top:20px; left:20px; z-index:2001;" class="opt-btn" onclick="closeGame()">← EXIT</button><div id="iframe-container" style="width:100%; height:100%;"></div></div>

    <audio id="bg-music" loop><source src="./bgmusic.mp3" type="audio/mpeg"></audio>

    <script>
        const COVER_BASE = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main/";
        const HTML_BASE = "https://cdn.jsdelivr.net/gh/freebuisness/html@main/";
        const SID = "1";
        let arcadeNextUrl = `https://feeds.gamepix.com/v2/json?order=quality&pagination=48&sid=${SID}`;
        
        const save = (k, v) => localStorage.setItem(`vlt_v6_${k}`, v);
        const load = (k) => localStorage.getItem(`vlt_v6_${k}`);

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
            if(v === 'cdn') loadCdnGames();
        }

        async function loadCdnGames() {
    try {
        const res = await fetch('./zones.json');
        if (!res.ok) throw new Error("Could not find zones.json");
        const games = await res.json();
        
        const grid = document.getElementById('cdn-grid');
        grid.innerHTML = ""; 

        // Filter out games with id: -1 and ensure they have a URL
        games.filter(g => g.id !== -1 && g.url).forEach(game => {
            // Normalize URLs to prevent "undefined" errors
            const cleanBase = HTML_BASE.endsWith('/') ? HTML_BASE : HTML_BASE + '/';
            const cleanCoverBase = COVER_BASE.endsWith('/') ? COVER_BASE : COVER_BASE + '/';

            const fullGameUrl = game.url.replace("{HTML_URL}/", cleanBase).replace("{HTML_URL}", cleanBase);
            const fullImageUrl = game.cover.replace("{COVER_URL}/", cleanCoverBase).replace("{COVER_URL}", cleanCoverBase);

            const card = document.createElement('div');
            card.className = 'game-card';
            card.setAttribute('data-title', game.name.toLowerCase());
            card.onclick = () => launchCdnGame(fullGameUrl);
            card.innerHTML = `
                <img src="${fullImageUrl}" onerror="this.onerror=null; this.src='https://via.placeholder.com/150/111/fff?text=No+Image';">
                <div class="game-info">
                    <h3>${game.name}</h3>
                    <span class="game-author">${game.author || "Unknown"}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    } catch (e) {
        console.error("Archive Load Error:", e);
    }
}

async function launchCdnGame(url) {
    if (!url || url.includes('undefined')) return;

    const container = document.getElementById('iframe-container');
    const gameView = document.getElementById('game-view');
    gameView.style.display = 'block';
    
    // Create the iframe
    container.innerHTML = `<iframe id="cdn-frame" allow="autoplay; fullscreen; keyboard; pointer-lock" style="width:100%; height:100%; border:none;"></iframe>`;
    const frame = document.getElementById('cdn-frame');

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("CORS/Filter Blocked");
        let rawHtml = await response.text();

        const frameDoc = frame.contentWindow.document;
        // Calculate the directory of the HTML file (e.g., https://cdn.../games/)
        const folderPath = url.substring(0, url.lastIndexOf('/') + 1);
        
        // Inject <base> tag so UnityLoader.js and .wasm files load from the CDN folder
        const baseTag = `<base href="${folderPath}">`;
        if (rawHtml.includes('<head>')) {
            rawHtml = rawHtml.replace('<head>', `<head>${baseTag}`);
        } else {
            rawHtml = baseTag + rawHtml;
        }

        frameDoc.open();
        frameDoc.write(rawHtml);
        frameDoc.close();
    } catch (e) {
        // Fallback: If fetch fails (ERR_BLOCKED_BY_CLIENT), load via src
        // This is the only way to bypass some heavy filters
        console.warn("Direct injection blocked. Falling back to src.");
        frame.src = url;
    }
}

async function launchCdnGame(url) {
    if (!url || url.includes('undefined')) {
        console.error("Invalid Game URL:", url);
        return;
    }

    const container = document.getElementById('iframe-container');
    const gameView = document.getElementById('game-view');
    gameView.style.display = 'block';
    
    // Clear and create new iframe
    container.innerHTML = `<iframe id="cdn-frame" allow="autoplay; fullscreen; keyboard; pointer-lock" style="width:100%; height:100%; border:none;"></iframe>`;
    const frame = document.getElementById('cdn-frame');

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("Fetch blocked");
        let rawHtml = await response.text();

        const frameDoc = frame.contentWindow.document;
        // This calculates the base path so Unity/JS files load from the CDN, not your site
        const folderPath = url.substring(0, url.lastIndexOf('/') + 1);
        
        if (rawHtml.includes('<head>')) {
            rawHtml = rawHtml.replace('<head>', `<head><base href="${folderPath}">`);
        } else {
            rawHtml = `<base href="${folderPath}">` + rawHtml;
        }

        frameDoc.open();
        frameDoc.write(rawHtml);
        frameDoc.close();
    } catch (e) {
        // If fetch is blocked by CORS or a Client Filter, load the URL directly in the src
        console.warn("Direct injection failed, falling back to src loading.");
        frame.src = url;
    }
}

        async function fetchArcade() {
            try {
                const res = await fetch(arcadeNextUrl);
                const data = await res.json();
                const grid = document.getElementById('arcade-grid');
                data.items.forEach(item => {
                    const card = document.createElement('div'); card.className = 'game-card';
                    card.onclick = () => {
                        document.getElementById('iframe-container').innerHTML = `<iframe src="https://play.gamepix.com/${item.namespace}/embed?sid=${SID}" style="width:100%;height:100%;border:none;"></iframe>`;
                        document.getElementById('game-view').style.display = 'block';
                    };
                    card.innerHTML = `<img src="${item.banner_image}"><div class="game-info"><h3>${item.title}</h3></div>`;
                    grid.appendChild(card);
                });
                arcadeNextUrl = data.next_url;
            } catch (e) {}
        }

        function universalFilter() {
            const q = document.getElementById('game-search').value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(c => c.style.display = c.getAttribute('data-title').includes(q) ? 'block' : 'none');
        }

        function setCloak(type) {
            const presets = {
                'google': { t: 'Google', i: 'https://www.google.com/favicon.ico' },
                'drive': { t: 'My Drive - Google Drive', i: 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png' },
                'classroom': { t: 'Classes', i: 'https://ssl.gstatic.com/classroom/favicon.png' },
                'none': { t: 'The Vault', i: '/favicon-96x96.png' }
            };
            document.title = presets[type].t; document.getElementById('tab-favicon').href = presets[type].i; save('cloak', type);
        }

        function setWeather(type) {
            const overlay = document.getElementById('weather-overlay'); const stars = document.getElementById('star-field');
            overlay.innerHTML = ''; stars.style.opacity = (type === 'stars' ? '1' : '0');
            if(type === 'none' || type === 'stars') return;
            for(let i=0; i<100; i++) {
                const el = document.createElement('div'); el.className = 'weather-item' + (type==='snow'?' snow':'');
                el.style.left = Math.random() * 100 + '%'; el.style.animationDuration = (Math.random() * 2 + 1) + 's';
                if(type === 'rain') { el.style.width = '1px'; el.style.height = '20px'; el.style.background = '#fff'; }
                overlay.appendChild(el);
            }
            save('weather', type);
        }

        function initStars() {
            const field = document.getElementById('star-field');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div'); star.className = 'star';
                star.style.width = '2px'; star.style.height = '2px'; star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's'); field.appendChild(star);
            }
        }

        const music = document.getElementById("bg-music");
        const volSlider = document.getElementById("music-volume");
        volSlider.addEventListener("input", () => { music.volume = volSlider.value/100; save('vol', volSlider.value); });
        function toggleMusic() { if(music.paused) music.play(); else music.pause(); }

        function closeGame() { document.getElementById('game-view').style.display = 'none'; document.getElementById('iframe-container').innerHTML = ''; }
        function toggleSettings(s) { document.getElementById('settings-modal').style.display = s ? 'block' : 'none'; document.getElementById('modal-overlay').style.display = s ? 'block' : 'none'; }
        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); save('theme', t); }

        const observer = new IntersectionObserver(e => { if(e[0].isIntersecting) fetchArcade(); });
        observer.observe(document.getElementById('sentinel'));

        window.onload = () => {
            initStars();
            setTheme(load('theme') || 'dark');
            setWeather(load('weather') || 'none');
            setCloak(load('cloak') || 'none');
            volSlider.value = load('vol') || 50; music.volume = volSlider.value/100;
            fetchArcade();
        };
    </script>
</body>
</html>
