<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vault Games</title>

<link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div id="weatherFx" class="weather-bg"></div>

<header class="header">
  <div class="title">Vault Games</div>
  <button class="btn" onclick="openSettings()">Settings</button>
</header>

<main id="gameGrid" class="grid"></main>

<!-- GAME VIEW -->
<div id="gameViewer" class="game-viewer">
  <div class="topbar">
    <button class="btn" onclick="closeGame()">Exit</button>
    <button class="btn" onclick="toggleFullscreen()">Fullscreen</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<!-- SETTINGS -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3>Settings</h3>

    <label>Theme</label>
    <select id="themeSelect">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
      <option value="ocean">Ocean</option>
      <option value="fire">Fire</option>
    </select>

    <br><br>

    <label>Weather FX</label>
    <select id="weatherSelect">
      <option value="none">None</option>
      <option value="rain">Rain</option>
      <option value="snow">Snow</option>
    </select>

    <br><br>

    <label>Cloaking</label>
    <select id="cloakSelect">
      <option value="none">None</option>
      <option value="about">about:blank</option>
      <option value="blob">blob:null</option>
    </select>

    <br><br>

    <button class="btn" onclick="applySettings()">Apply</button>
  </div>
</div>

<script src="games.js"></script>
<script src="ui.js"></script>
<script src="settings.js"></script>
<script src="app.js"></script>

</body>
</html>
