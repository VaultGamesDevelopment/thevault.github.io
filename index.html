<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="tab-title">The Vault | Premium Arcade</title>

<link id="tab-favicon" rel="icon" href="/favicon-96x96.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
--bg:#050505;--text:#fff;--accent:#3b82f6;
--card:#0f0f0f;--border:#262626;
--nav:rgba(5,5,5,.8);--secondary:#a3a3a3;
--glass:rgba(255,255,255,.05);
}

[data-theme="midnight"]{--bg:#020617;--card:#0f172a;--accent:#38bdf8;}
[data-theme="space"]{--bg:#020205;--card:#090915;--accent:#a855f7;}
[data-theme="rose"]{--bg:#1a0f14;--card:#2d1a22;--accent:#fb7185;}
[data-theme="gold"]{--bg:#0a0a05;--card:#1c1917;--accent:#eab308;}
[data-theme="uv"]{--bg:#0f0720;--card:#1c1033;--accent:#22d3ee;}

body{margin:0;font-family:Inter;background:var(--bg);color:var(--text);overflow-x:hidden}

/* HEADER */
header{
display:flex;align-items:center;justify-content:space-between;
padding:1rem 5%;position:sticky;top:0;
background:var(--nav);backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}
.logo{font-weight:800;cursor:pointer}
nav{display:flex;gap:20px}
nav a{color:var(--secondary);cursor:pointer;font-size:.8rem}
nav a.active{color:#fff}

#game-search{
padding:10px 15px;border-radius:12px;
background:var(--glass);border:1px solid var(--border);
color:#fff;
}

/* GRID */
.view-section{display:none;padding:2rem 5%}
.view-section.active{display:block}

.grid-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:18px;
}

.game-card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.25s;
}
.game-card:hover{
transform:translateY(-6px);
border-color:var(--accent);
box-shadow:0 10px 20px -5px var(--accent);
}

.game-card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.game-info{text-align:center;padding:10px}

/* SETTINGS */
#settings-modal{
display:none;position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:var(--card);
padding:30px;border-radius:20px;
width:90%;max-width:450px;
z-index:1000;border:1px solid var(--border);
}
.modal-overlay{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.8);
z-index:999;
}

.setting-title{
font-size:.7rem;font-weight:800;
text-transform:uppercase;color:var(--secondary);
margin-bottom:10px;display:block;
}

.btn-row{display:flex;flex-wrap:wrap;gap:8px}
.opt-btn{
padding:8px 14px;border-radius:10px;
border:1px solid var(--border);
background:var(--glass);color:#fff;
cursor:pointer;font-size:.75rem;
}

/* ATMOSPHERE */
#star-field,#weather-overlay{
position:fixed;inset:0;pointer-events:none;
}
.star{
position:absolute;background:#fff;border-radius:50%;
animation:twinkle var(--d) infinite;
}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}

.weather-item{
position:absolute;top:-50px;
animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(110vh)}}

.weather-item.snow{
width:6px;height:6px;border-radius:50%;
background:#fff;
}

/* GAME VIEW */
#game-view{
display:none;position:fixed;inset:0;
background:#000;z-index:2000;
}
</style>
</head>

<body>

<div id="star-field"></div>
<div id="weather-overlay"></div>

<header>
<div class="logo" onclick="showView('home')">THE VAULT</div>

<nav>
<a id="nav-home" class="active" onclick="showView('home')">Arcade</a>
<a id="nav-cdn" onclick="showView('cdn')">Archive</a>
</nav>

<input id="game-search" placeholder="Search..." onkeyup="universalFilter()">

<button class="opt-btn" onclick="toggleSettings(true)">Settings</button>
</header>

<section id="view-home" class="view-section active">
<div class="grid-container" id="arcade-grid"></div>
<div id="sentinel"></div>
</section>

<section id="view-cdn" class="view-section">
<div class="grid-container" id="cdn-grid"></div>
</section>

<div class="modal-overlay" id="modal-overlay" onclick="toggleSettings(false)"></div>

<div id="settings-modal">

<span class="setting-title">Theme</span>
<div class="btn-row">
<button class="opt-btn" onclick="setTheme('dark')">Dark</button>
<button class="opt-btn" onclick="setTheme('midnight')">Midnight</button>
<button class="opt-btn" onclick="setTheme('space')">Space</button>
<button class="opt-btn" onclick="setTheme('rose')">Rose</button>
<button class="opt-btn" onclick="setTheme('gold')">Gold</button>
<button class="opt-btn" onclick="setTheme('uv')">UV</button>
</div>

<br>

<span class="setting-title">Atmosphere</span>
<div class="btn-row">
<button class="opt-btn" onclick="setWeather('none')">None</button>
<button class="opt-btn" onclick="setWeather('rain')">Rain</button>
<button class="opt-btn" onclick="setWeather('snow')">Snow</button>
<button class="opt-btn" onclick="setWeather('stars')">Stars</button>
</div>

<br>

<span class="setting-title">Cloak</span>
<div class="btn-row">
<button class="opt-btn" onclick="setCloak('none')">None</button>
<button class="opt-btn" onclick="setCloak('google')">Google</button>
<button class="opt-btn" onclick="setCloak('drive')">Drive</button>
<button class="opt-btn" onclick="setCloak('classroom')">Classroom</button>
</div>

<br>

<button style="width:100%" onclick="toggleSettings(false)">Close</button>
</div>

<div id="game-view">
<button onclick="closeGame()">EXIT</button>
<div id="iframe-container" style="width:100%;height:100%"></div>
</div>

<script>
const SID="1";
let next=`https://feeds.gamepix.com/v2/json?pagination=48&sid=${SID}`;
let loading=false;

const save=(k,v)=>localStorage.setItem("vault_"+k,v);
const load=k=>localStorage.getItem("vault_"+k);

/* VIEW */
function showView(v){
document.querySelectorAll('.view-section').forEach(s=>s.classList.remove('active'));
document.getElementById(`view-${v}`).classList.add('active');
}

/* FETCH */
async function fetchArcade(){
if(loading||!next)return;
loading=true;

let r=await fetch(next);
let d=await r.json();

const grid=document.getElementById('arcade-grid');

d.items.forEach(g=>{
let c=document.createElement('div');
c.className='game-card';
c.dataset.title=g.title.toLowerCase();

c.onclick=()=>launchArcade(g);

c.innerHTML=`<img src="${g.banner_image}">
<div class="game-info"><h4>${g.title}</h4></div>`;
grid.appendChild(c);
});

next=d.next_url;
loading=false;
}

/* GAME */
function launchArcade(g){
document.getElementById('iframe-container').innerHTML=
`<iframe src="https://play.gamepix.com/${g.namespace}/embed?sid=${SID}" style="width:100%;height:100%;border:none;"></iframe>`;
document.getElementById('game-view').style.display='block';
}
function closeGame(){
document.getElementById('game-view').style.display='none';
}

/* SEARCH */
function universalFilter(){
const q=document.getElementById('game-search').value.toLowerCase();
document.querySelectorAll('.game-card').forEach(c=>{
c.style.display=c.dataset.title.includes(q)?'block':'none';
});
}

/* SETTINGS */
function toggleSettings(s){
document.getElementById('settings-modal').style.display=s?'block':'none';
document.getElementById('modal-overlay').style.display=s?'block':'none';
}

/* THEME */
function setTheme(t){
document.documentElement.setAttribute('data-theme',t);
save("theme",t);
}

/* WEATHER */
function setWeather(type){
const overlay=document.getElementById('weather-overlay');
const stars=document.getElementById('star-field');
overlay.innerHTML=""; stars.innerHTML="";
save("weather",type);

if(type==="stars"){
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.width=s.style.height=Math.random()*2+"px";
s.style.setProperty("--d",(Math.random()*3+2)+"s");
stars.appendChild(s);
}
return;
}

if(type==="none") return;

for(let i=0;i<100;i++){
let el=document.createElement("div");
el.className="weather-item";
el.style.left=Math.random()*100+"%";
el.style.animationDuration=(Math.random()*2+1)+"s";

if(type==="rain"){
el.style.width="1px";el.style.height="25px";
el.style.background="rgba(255,255,255,.3)";
}
if(type==="snow") el.classList.add("snow");

overlay.appendChild(el);
}
}

/* CLOAK */
function setCloak(type){
const presets={
google:{t:"Google",i:"https://www.google.com/favicon.ico"},
drive:{t:"Drive",i:"https://ssl.gstatic.com/images/branding/product/1x/drive_48dp.png"},
classroom:{t:"Classes",i:"https://ssl.gstatic.com/classroom/favicon.png"},
none:{t:"The Vault",i:"/favicon-96x96.png"}
};
document.title=presets[type].t;
document.getElementById("tab-favicon").href=presets[type].i;
save("cloak",type);
}

/* INIT */
const obs=new IntersectionObserver(e=>{
if(e[0].isIntersecting)fetchArcade();
});
obs.observe(document.getElementById("sentinel"));

window.onload=()=>{
setTheme(load("theme")||"dark");
setWeather(load("weather")||"none");
setCloak(load("cloak")||"none");
fetchArcade();
};
</script>

</body>
</html>
