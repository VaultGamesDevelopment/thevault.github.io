<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Vault</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h1 class="logo">The Vault</h1>

    <input id="searchInput" type="text" placeholder="Search games..." />

    <button id="settingsBtn">⚙ Settings</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="header">
      <h2>Welcome to The Vault</h2>
      <p>Secure access to unblocked games</p>
    </div>

    <div id="gamesContainer" class="games-grid"></div>

  </main>

</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h2>Settings</h2>

    <label>
      Theme:
      <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </label>

    <label>
      Grid Size:
      <select id="gridSizeSelect">
        <option value="small">Small</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Large</option>
      </select>
    </label>

    <label>
      Show Descriptions:
      <input type="checkbox" id="toggleDesc" checked />
    </label>

    <button id="closeSettings">Close</button>
  </div>
</div>

<script src="games.js"></script>
<script src="app.js"></script>

</body>
</html>
