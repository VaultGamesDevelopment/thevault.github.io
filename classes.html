<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault</title>
<link rel="stylesheet" href="vault.css">
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Vault</div>

    <input id="search" placeholder="Search games..." />

    <button onclick="Vault.toggleSettings()">Settings</button>

    <button onclick="Vault.cloak('google')">Google Cloak</button>
    <button onclick="Vault.cloak('drive')">Drive Cloak</button>
    <button onclick="Vault.cloak('classroom')">Classroom Cloak</button>
    <button onclick="Vault.cloak('canvas')">Canvas Cloak</button>
    <button onclick="Vault.cloak('wiki')">Wikipedia Cloak</button>

    <button onclick="Vault.cloak('about')">About:Blank</button>
    <button onclick="Vault.cloak('none')">Remove Cloak</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="grid" class="grid"></div>
  </main>

</div>

<!-- SETTINGS -->
<div id="settings" class="settings hidden">
  <h2>Vault Settings</h2>

  <label>Accent Color</label>
  <input type="color" id="accent">

  <label>Background Theme</label>
  <button onclick="Vault.theme('midnight')">Midnight</button>
  <button onclick="Vault.theme('space')">Space</button>
  <button onclick="Vault.theme('matrix')">Matrix</button>
  <button onclick="Vault.theme('void')">Void</button>
</div>

<script src="vault.js"></script>
</body>
</html>
