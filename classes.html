<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault OS</title>
<link rel="stylesheet" href="vault.css">
<link rel="icon" href="data:,">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Vault OS</div>

    <input id="search" placeholder="Search games..." />

    <div class="group">
      <button data-action="settings">Settings</button>
    </div>

    <div class="group">
      <button data-action="cloak-google">Google</button>
      <button data-action="cloak-drive">Drive</button>
      <button data-action="cloak-classroom">Classroom</button>
      <button data-action="cloak-wiki">Wikipedia</button>
      <button data-action="cloak-canvas">Canvas</button>
    </div>

    <div class="group">
      <button data-action="cloak-about">About:Blank</button>
      <button data-action="cloak-none">Remove Cloak</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="grid" class="grid"></div>
  </main>

</div>

<!-- SETTINGS -->
<div id="settings" class="settings hidden">
  <h2>Vault Settings</h2>

  <label>Theme</label>
  <button data-theme="midnight">Midnight</button>
  <button data-theme="space">Space</button>
  <button data-theme="matrix">Matrix</button>
  <button data-theme="void">Void</button>

  <label>Accent</label>
  <input type="color" id="accent">

  <label>Performance</label>
  <button onclick="Vault.clearCache()">Clear Cache</button>
</div>

<script src="vault.js"></script>
</body>
</html>
