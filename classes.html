<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Vault</title>
<link rel="icon" href="data:,">

<style>
:root {
  --accent: #8a2be2;
  --bg: #0a0a0a;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: white;
  overflow: hidden;
}

#app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #0f0f0f;
  padding: 15px;
}

.sidebar h1 {
  color: var(--accent);
}

/* MAIN GRID */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
}

.card:hover {
  outline: 2px solid var(--accent);
}

/* FAVORITE STAR */
.star {
  position: absolute;
  top: 8px;
  right: 8px;
  color: #555;
  cursor: pointer;
}

.star.active {
  color: var(--accent);
}

/* SETTINGS PANEL */
.settings {
  position: absolute;
  right: 20px;
  top: 20px;
  width: 320px;
  background: rgba(20,20,20,0.9);
  padding: 15px;
  border-radius: 12px;
  display: none;
}

button {
  background: #222;
  color: white;
  border: none;
  padding: 6px;
  margin: 4px 0;
  cursor: pointer;
  width: 100%;
}

button:hover {
  background: #333;
}

input {
  width: 100%;
  padding: 6px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>Vault</h1>

    <input id="search" placeholder="Search..." />

    <button onclick="toggleSettings()">Settings</button>

    <button onclick="cloak('google')">Google Cloak</button>
    <button onclick="cloak('drive')">Drive Cloak</button>
    <button onclick="cloak('classroom')">Classroom Cloak</button>
    <button onclick="cloak('wikipedia')">Wikipedia Cloak</button>
    <button onclick="cloak('canvas')">Canvas Cloak</button>

    <button onclick="cloak('about')">About:Blank Cloak</button>
    <button onclick="cloak('none')">Remove Cloak</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="grid" class="grid"></div>
  </div>

</div>

<!-- SETTINGS -->
<div id="settings" class="settings">
  <h3>Vault Settings</h3>

  <label>Accent Color</label>
  <input type="color" id="accentPicker" value="#8a2be2">

  <label>Background</label>
  <button onclick="setTheme('midnight')">Midnight</button>
  <button onclick="setTheme('space')">Space Dust</button>
  <button onclick="setTheme('matrix')">Matrix</button>
  <button onclick="setTheme('void')">Void</button>

  <label>Effects</label>
  <button onclick="toggleParticles()">Toggle Particles</button>
</div>

<script src="vault.js"></script>
</body>
</html>
