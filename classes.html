<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Vault</title>

<style>
/* =======================
   VAULT CORE THEME
======================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070A12;
    color: white;
    overflow-x: hidden;
}

#container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 20px;
}

.zone-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
}

.zone-item:hover {
    transform: scale(1.05);
    border-color: #7c5cff;
    box-shadow: 0 0 20px rgba(124,92,255,0.4);
}

.zone-item img {
    width: 100%;
    border-radius: 10px;
}

/* =======================
   VIEWER
======================= */
#zoneViewer {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
}

#zoneFrame {
    flex: 1;
    border: none;
}

/* =======================
   SETTINGS PANEL
======================= */
#settings {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(20,20,30,0.9);
    border: 1px solid #333;
    padding: 10px;
    border-radius: 10px;
    z-index: 999;
}

button, select {
    background: #151525;
    color: white;
    border: 1px solid #333;
    padding: 6px;
    border-radius: 6px;
    margin: 2px;
    cursor: pointer;
}

/* =======================
   BACKGROUND EFFECTS
======================= */
canvas {
    position: fixed;
    inset: 0;
    z-index: -1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="settings">
    <button onclick="setTheme('vault')">Vault</button>
    <button onclick="setTheme('cyber')">Cyber</button>
    <button onclick="setTheme('void')">Void</button>

    <select onchange="setWeather(this.value)">
        <option value="none">Weather</option>
        <option value="rain">Rain</option>
        <option value="snow">Snow</option>
        <option value="stars">Stars</option>
        <option value="grid">Cyber Grid</option>
        <option value="hyper">Hyper Jump</option>
    </select>
</div>

<div id="container"></div>

<div id="zoneViewer">
    <iframe id="zoneFrame"></iframe>
</div>

<script>
/* =======================
   CORE VARIABLES
======================= */
const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');

const zonesurls = [
"https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json",
"https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
"https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json"
];

let zonesURL = zonesurls[Math.floor(Math.random()*zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";

let zones = [];

/* =======================
   FILTER OUT BAD IDS
======================= */
function validZone(z){
    if(!z) return false;
    if(z.id === -1) return false;
    if(!z.name) return false;
    return true;
}

/* =======================
   LOAD ZONES
======================= */
async function listZones(){
    const res = await fetch(zonesURL + "?t=" + Date.now());
    const json = await res.json();

    zones = json.filter(validZone);

    displayZones(zones);
}

/* =======================
   DISPLAY ZONES
======================= */
function displayZones(list){
    container.innerHTML = "";

    list.forEach(file => {
        const div = document.createElement("div");
        div.className = "zone-item";

        div.onclick = () => openZone(file);

        const img = document.createElement("img");
        img.src = file.cover?.replace("{COVER_URL}", coverURL) || "";
        div.appendChild(img);

        const btn = document.createElement("div");
        btn.innerText = file.name;
        div.appendChild(btn);

        container.appendChild(div);
    });
}

/* =======================
   OPEN GAME
======================= */
function openZone(file){
    const url = file.url.replace("{HTML_URL}", htmlURL);

    fetch(url).then(r => r.text()).then(html => {
        zoneViewer.style.display = "flex";
        zoneFrame.srcdoc = html;
    });
}

/* =======================
   CLOSE
======================= */
zoneViewer.onclick = () => {
    zoneViewer.style.display = "none";
    zoneFrame.srcdoc = "";
};

/* =======================
   THEMES
======================= */
function setTheme(t){
    if(t === "vault"){
        document.body.style.background = "#070A12";
    }
    if(t === "cyber"){
        document.body.style.background = "linear-gradient(90deg,#0ff,#00f)";
    }
    if(t === "void"){
        document.body.style.background = "#000";
    }
}

/* =======================
   WEATHER SYSTEM
======================= */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let mode = "none";
let particles = [];

function setWeather(m){
    mode = m;
    particles = [];

    for(let i=0;i<100;i++){
        particles.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            s: Math.random()*3+1
        });
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(mode === "rain"){
        ctx.strokeStyle = "#7c5cff";
        particles.forEach(p=>{
            ctx.beginPath();
            ctx.moveTo(p.x,p.y);
            ctx.lineTo(p.x,p.y+10);
            ctx.stroke();
            p.y += 8;
            if(p.y>canvas.height) p.y=0;
        });
    }

    if(mode === "snow"){
        ctx.fillStyle = "white";
        particles.forEach(p=>{
            ctx.fillRect(p.x,p.y,2,2);
            p.y += 1;
            if(p.y>canvas.height) p.y=0;
        });
    }

    if(mode === "stars"){
        ctx.fillStyle = "white";
        particles.forEach(p=>{
            ctx.fillRect(p.x,p.y,1,1);
        });
    }

    if(mode === "grid"){
        ctx.strokeStyle = "#0ff";
        for(let i=0;i<canvas.width;i+=40){
            ctx.beginPath();
            ctx.moveTo(i,0);
            ctx.lineTo(i,canvas.height);
            ctx.stroke();
        }
    }

    if(mode === "hyper"){
        ctx.fillStyle = "rgba(124,92,255,0.2)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    requestAnimationFrame(animate);
}
animate();

/* =======================
   INIT
======================= */
listZones();
</script>

</body>
</html>
