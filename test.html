<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #1a0033 0%, #000 60%);
      overflow: hidden;
      color: white;
    }

    /* animated purple streaks */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        120deg,
        rgba(140, 0, 255, 0.15) 0px,
        rgba(140, 0, 255, 0.05) 2px,
        transparent 6px,
        transparent 10px
      );
      animation: move 8s linear infinite;
      pointer-events: none;
    }

    @keyframes move {
      from { transform: translateX(0); }
      to { transform: translateX(100px); }
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      text-align: center;
      width: 80%;
      z-index: 10;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 6px;
      color: #c084fc;
      text-shadow: 0 0 20px #7c3aed;
    }

    .subtitle {
      font-size: 12px;
      letter-spacing: 4px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .search-box {
      margin-top: 30px;
      display: flex;
      justify-content: center;
    }

    input {
      width: 60%;
      padding: 15px 20px;
      border-radius: 30px;
      border: 1px solid #7c3aed;
      outline: none;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 15px 20px;
      border-radius: 30px;
      border: none;
      background: #7c3aed;
      color: white;
      cursor: pointer;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 5;
    }

    .hint {
      margin-top: 15px;
      font-size: 11px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <iframe id="viewer"></iframe>

  <div class="center" id="home">
    <h1>THE VAULT</h1>
    <div class="subtitle">SECURE ARCHIVE ACCESS</div>

    <div class="search-box">
      <input id="urlInput" placeholder="Enter URL or search term..." />
      <button onclick="go()">→</button>
    </div>

    <div class="hint">CORS Tunnel • Encrypted Session • Stealth UI</div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const home = document.getElementById('home');
    const input = document.getElementById('urlInput');

    function normalize(url) {
      if (!url) return '';
      if (!url.startsWith('http')) {
        return 'https://duckduckgo.com/?q=' + encodeURIComponent(url);
      }
      return url;
    }

    function go() {
      const url = normalize(input.value.trim());
      if (!url) return;

      home.style.display = 'none';
      viewer.style.display = 'block';
      viewer.src = url;

      window.history.replaceState({}, '', '?url=' + encodeURIComponent(url));
    }

    // load from query
    const params = new URLSearchParams(location.search);
    const q = params.get('url');
    if (q) {
      input.value = q;
      go();
    }
  </script>

</body>
</html>
