<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Study Portal Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
    background:#0b1120;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* UI */
.container{width:min(1300px,95%);margin:auto;padding:30px;}

.topbar{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}

input{
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#111827;
    color:white;
}

button{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
}

/* cards */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#111827;
    border:1px solid #334155;
    border-radius:14px;
    padding:14px;
    transition:0.2s;
}
.card:hover{transform:translateY(-3px);}

/* status */
.status{margin-top:10px;font-size:14px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.online .dot{background:#22c55e;}
.offline .dot{background:#ef4444;}
.checking .dot{background:#facc15;}

/* toast */
.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    padding:12px 16px;
    border:1px solid #334155;
    border-radius:10px;
    opacity:0;
    transform:translateY(20px);
    transition:0.3s;
}
.toast.show{opacity:1;transform:translateY(0);}

/* boot */
.boot{
    position:fixed;
    inset:0;
    background:#050816;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}
.boot.hidden{opacity:0;pointer-events:none;transition:1s;}

</style>
</head>

<body>

<div class="boot" id="boot">Loading...</div>

<div class="toast" id="toast"></div>

<div class="container">

<div class="topbar">
    <input id="search" placeholder="Search links..."/>
    <button onclick="refresh()">Refresh</button>
    <button onclick="toggleSettings()">Settings</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
lucide.createIcons();

/* LINKS */
const links = [
"https://h2aihbtm.frogseducation.com/",
"https://lc.snbs.cl/",
"https://study.rugal.net/",
"https://buy.villagerobots.com/",
"https://edu.cheradise.eu/",
"https://edu.xopf.net/"
];

/* STATE */
let cache = JSON.parse(localStorage.getItem("cache")||"{}");
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

/* TOAST */
function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
}

/* STATUS CHECK */
async function check(url){
    if(cache[url] && Date.now()-cache[url].t < 60000){
        return cache[url].s;
    }

    try{
        await fetch(url,{mode:"no-cors"});
        cache[url]={s:"online",t:Date.now()};
        return "online";
    }catch{
        cache[url]={s:"offline",t:Date.now()};
        return "offline";
    }
}

/* RENDER */
async function load(){
    const g=document.getElementById("grid");
    g.innerHTML="";

    for(const l of links){
        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <div>${l}</div>
            <div class="status checking"><span class="dot"></span>checking</div>
            <button onclick="copy('${l}')">Copy</button>
        `;
        g.appendChild(card);

        const st=await check(l);
        const status=card.querySelector(".status");

        status.className="status "+st;
        status.innerHTML=`<span class="dot"></span>${st}`;
    }

    localStorage.setItem("cache",JSON.stringify(cache));
}

/* COPY */
function copy(t){
    navigator.clipboard.writeText(t);
    toast("Copied!");
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display=c.innerText.toLowerCase().includes(e.target.value.toLowerCase())
        ?"block":"none";
    });
});

/* SHORTCUTS */
document.addEventListener("keydown",e=>{
    if(e.key==="/") document.getElementById("search").focus();
    if(e.key==="r") refresh();
});

function refresh(){
    cache={};
    load();
}

/* BOOT */
setTimeout(()=>{
    document.getElementById("boot").classList.add("hidden");
    load();
},1200);

</script>

</body>
</html>
