<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="icon" type="image/x-icon" href="https://www.gstatic.com/classroom/logo_square_rounded.svg">

<title>Classes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0b1120;
    --panel:#111827bb;
    --border:#334155;
    --text:#ffffff;
    --muted:#94a3b8;
    --blue:#2563eb;
    --purple:#7c3aed;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:white;
    overflow-x:hidden;
    min-height:100vh;
}

/* BOOT SCREEN */

.boot-screen{
    position:fixed;
    inset:0;
    background:#050816;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:99999;
    overflow:hidden;
    transition:1s ease;
}

.boot-screen.hidden{
    opacity:0;
    pointer-events:none;
}

.boot-content{
    text-align:center;
    width:min(500px,90%);
}

.boot-logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:24px;
    background:linear-gradient(135deg,var(--blue),var(--purple));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:
        0 0 50px #2563eb66,
        0 0 120px #7c3aed33;
    animation:float 2s infinite ease-in-out;
}

.boot-logo i{
    width:42px;
    height:42px;
}

.boot-title{
    margin-top:28px;
    font-size:34px;
    font-weight:700;
}

.boot-sub{
    margin-top:10px;
    color:var(--muted);
    font-size:15px;
}

.boot-bar{
    width:100%;
    height:10px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:40px;
    border:1px solid #334155;
}

.boot-progress{
    height:100%;
    width:0%;
    border-radius:999px;
    background:
        linear-gradient(
            90deg,
            var(--blue),
            #3b82f6,
            var(--purple)
        );
    box-shadow:0 0 20px #2563eb;
    transition:0.25s ease;
}

.boot-status{
    margin-top:14px;
    color:#cbd5e1;
    font-size:14px;
    letter-spacing:0.5px;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

#tsparticles{
    position:fixed;
    inset:0;
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left,#2563eb33,transparent 30%),
        radial-gradient(circle at bottom right,#7c3aed33,transparent 30%);
    z-index:-1;
}

.container{
    width:min(1400px,95%);
    margin:auto;
    padding:40px 0;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.logo{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo-icon{
    width:55px;
    height:55px;
    border-radius:18px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 30px #2563eb55;
}

.logo-icon i{
    width:28px;
    height:28px;
}

.logo-text h1{
    font-size:28px;
}

.logo-text p{
    color:#94a3b8;
    margin-top:4px;
}

.actions{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.search-wrapper{
    position:relative;
}

.search-wrapper i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    color:#94a3b8;
}

.search{
    width:300px;
    max-width:100%;
    background:#111827cc;
    border:1px solid #334155;
    color:white;
    padding:14px 16px 14px 44px;
    border-radius:14px;
    outline:none;
    backdrop-filter:blur(10px);
}

.refresh-btn{
    border:none;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:14px 20px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s ease;
    display:flex;
    align-items:center;
    gap:10px;
}

.refresh-btn i{
    width:18px;
    height:18px;
}

.refresh-btn:hover{
    transform:translateY(-2px);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:30px;
}

.stat-card{
    background:#111827aa;
    border:1px solid #334155;
    border-radius:22px;
    padding:24px;
    backdrop-filter:blur(14px);
    position:relative;
    overflow:hidden;
}

.stat-icon{
    position:absolute;
    right:20px;
    top:20px;
    opacity:0.15;
}

.stat-icon i{
    width:34px;
    height:34px;
}

.stat-card h2{
    font-size:34px;
    margin-bottom:8px;
}

.stat-card p{
    color:#94a3b8;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:22px;
}

.card{
    background:#111827bb;
    border:1px solid #334155;
    border-radius:24px;
    padding:22px;
    backdrop-filter:blur(16px);
    transition:0.25s ease;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#60a5fa;
    box-shadow:0 0 30px #2563eb22;
}

.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,#2563eb11,#7c3aed11);
    opacity:0;
    transition:0.25s ease;
}

.card:hover::before{
    opacity:1;
}

.domain{
    font-size:16px;
    line-height:1.5;
    word-break:break-all;
    margin-bottom:18px;
    color:#e2e8f0;
    position:relative;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    font-weight:600;
    position:relative;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
}

.online .dot{
    background:#22c55e;
    box-shadow:0 0 14px #22c55e;
}

.offline .dot{
    background:#ef4444;
    box-shadow:0 0 14px #ef4444;
}

.checking .dot{
    background:#facc15;
    box-shadow:0 0 14px #facc15;
}

.buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    position:relative;
}

.btn{
    flex:1;
    min-width:120px;
    text-align:center;
    text-decoration:none;
    color:white;
    padding:12px 16px;
    border-radius:14px;
    font-weight:600;
    transition:0.2s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.btn i{
    width:18px;
    height:18px;
}

.open-btn{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.copy-btn{
    background:#1e293b;
    border:1px solid #334155;
    cursor:pointer;
}

.btn:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#94a3b8;
}

@media(max-width:700px){

    .topbar{
        flex-direction:column;
        align-items:stretch;
    }

    .actions{
        width:100%;
    }

    .search{
        width:100%;
    }

    .refresh-btn{
        width:100%;
        justify-content:center;
    }
}
</style>
</head>
<body>

<!-- BOOT SCREEN -->

<div class="boot-screen" id="bootScreen">

    <div class="boot-content">

        <div class="boot-logo">
            <i data-lucide="graduation-cap"></i>
        </div>

        <div class="boot-title">
            Classes
        </div>

        <div class="boot-sub">
            Initializing live dashboard...
        </div>

        <div class="boot-bar">
            <div class="boot-progress" id="bootProgress"></div>
        </div>

        <div class="boot-status" id="bootStatus">
            Booting modules...
        </div>

    </div>

</div>

<div id="tsparticles"></div>
<div class="overlay"></div>

<div class="container">

    <div class="topbar">

        <div class="logo">

            <div class="logo-icon">
                <i data-lucide="graduation-cap"></i>
            </div>

            <div class="logo-text">
                <h1>Study Portal</h1>
                <p>Live status dashboard</p>
            </div>

        </div>

        <div class="actions">

            <div class="search-wrapper">

                <i data-lucide="search"></i>

                <input
                    type="text"
                    class="search"
                    placeholder="Search links..."
                    id="searchInput"
                >

            </div>

            <button class="refresh-btn" onclick="loadCards()">

                <i data-lucide="refresh-cw"></i>

                Refresh Status

            </button>

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">

            <div class="stat-icon">
                <i data-lucide="database"></i>
            </div>

            <h2 id="totalCount">0</h2>
            <p>Total Links</p>

        </div>

        <div class="stat-card">

            <div class="stat-icon">
                <i data-lucide="activity"></i>
            </div>

            <h2 id="onlineCount">0</h2>
            <p>Online</p>

        </div>

        <div class="stat-card">

            <div class="stat-icon">
                <i data-lucide="shield-x"></i>
            </div>

            <h2 id="offlineCount">0</h2>
            <p>Offline</p>

        </div>

    </div>

    <div class="grid" id="grid"></div>

    <div class="footer">
        Sleek educational dashboard • Live uptime monitor
    </div>

</div>

<script>
lucide.createIcons();

tsParticles.load("tsparticles", {
    fpsLimit:60,
    particles:{
        number:{
            value:90
        },
        color:{
            value:["#2563eb","#7c3aed","#60a5fa"]
        },
        links:{
            enable:true,
            distance:150,
            color:"#334155",
            opacity:0.4
        },
        move:{
            enable:true,
            speed:1
        },
        opacity:{
            value:0.5
        },
        size:{
            value:{min:1,max:4}
        }
    },
    interactivity:{
        events:{
            onHover:{
                enable:true,
                mode:"grab"
            }
        }
    }
});

const links = [ "https://h2aihbtm.frogseducation.com/", "https://lc.snbs.cl/", "https://study.rugal.net/", "https://buy.villagerobots.com/", "https://edu.cheradise.eu/", "https://edu.xopf.net/", "https://study.elefante.cl/", "https://ishemrctiy.vocations.pics/", "https://signup.clever.com.codeland.se", "https://lecture.grammar.history.student.literature.mindboggle.us", "https://biology.geography.drama.studying.math.mindboggle.us", "https://funde.clever.com.eminescusm.ro", "https://algebra.engineering.calculus.technology.chemistry.mindboggle.us", "https://classroom.biology.english.grammar.library.mindboggle.us", "https://clever.com.andyluse.com", "https://student.clever.com.youngchem.com", "https://student.clever.com.sfero.cl", "https://signup.clever.com.aenaon.eu", "https://signup.clever.com.voudouris.org", "https://signup.clever.com.lefty.ro", "https://ivtx.arionskyclub.com", "https://jojsa.arionskyclub.com", "https://lypvv.arionskyclub.com", "https://vnni.arionskyclub.com", "https://xvwui.arionskyclub.com", "https://jivmy.hoohaamelbourne.com.au", "https://mfgqf.hoohaamelbourne.com.au", "https://pwuki.hoohaamelbourne.com.au", "https://sdvfb.hoohaamelbourne.com.au", "https://zyyhh.hoohaamelbourne.com.au", "https://dbxff.joyitasparejas.com", "https://hrysq.joyitasparejas.com", "https://jgkll.joyitasparejas.com", "https://lamrf.joyitasparejas.com", "https://prnw.joyitasparejas.com", "https://ainkq.simplysweetcakesoc.com", "https://ajqu.simplysweetcakesoc.com", "https://dycc.simplysweetcakesoc.com", "https://lowlh.simplysweetcakesoc.com", "https://uinj.simplysweetcakesoc.com", "https://fpfwh.soyescalahumana.cl", "https://hazbo.soyescalahumana.cl", "https://shyas.soyescalahumana.cl", "https://zbyau.soyescalahumana.cl", "https://zltvl.soyescalahumana.cl", "https://bayy.dinocol.co.uk", "https://gujg.dinocol.co.uk", "https://jryy.dinocol.co.uk", "https://rvwn.dinocol.co.uk", "https://wlakp.dinocol.co.uk", "https://hnav.kora.cl", "https://khdc.kora.cl", "https://nphdt.kora.cl", "https://pibl.kora.cl", "https://ztwq.kora.cl", "https://rkxgu.maxmir-energy.ru" ];

const grid = document.getElementById("grid");

async function bootSequence(){

    const progress =
        document.getElementById("bootProgress");

    const status =
        document.getElementById("bootStatus");

    const bootScreen =
        document.getElementById("bootScreen");

    const steps = [
        "Loading dashboard...",
        "Connecting modules...",
        "Fetching uptime engine...",
        "Scanning links...",
        "Finalizing interface..."
    ];

    for(let i = 0; i < steps.length; i++){

        status.textContent = steps[i];

        progress.style.width =
            ((i + 1) / steps.length) * 100 + "%";

        await new Promise(r =>
            setTimeout(r,700)
        );
    }

    bootScreen.classList.add("hidden");

    setTimeout(()=>{
        bootScreen.remove();
    },1000);
}

async function checkStatus(url){

    return new Promise((resolve)=>{

        let finished = false;

        function online(){

            if(!finished){

                finished = true;

                resolve("online");
            }
        }

        function offline(){

            if(!finished){

                finished = true;

                resolve("offline");
            }
        }

        setTimeout(()=>{
            offline();
        },8000);

        const favicon = new Image();

        favicon.onload = online;

        favicon.onerror = ()=>{

            fetch(url,{
                mode:"no-cors"
            })
            .then(()=>online())
            .catch(()=>offline());

        };

        favicon.src =
            url.replace(/\/$/,"") +
            "/favicon.ico?cache=" +
            Date.now();

    });
}

async function loadCards(){

    grid.innerHTML = "";

    let online = 0;
    let offline = 0;

    document.getElementById("totalCount")
        .innerText = links.length;

    for(const link of links){

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <div class="domain">${link}</div>

            <div class="status checking">
                <div class="dot"></div>
                <span>Checking...</span>
            </div>

            <div class="buttons">

                <a
                    href="${link}"
                    target="_blank"
                    class="btn open-btn"
                >

                    <i data-lucide="external-link"></i>

                    Open

                </a>

                <button
                    class="btn copy-btn"
                    onclick="copyLink('${link}')"
                >

                    <i data-lucide="copy"></i>

                    Copy

                </button>

            </div>
        `;

        grid.appendChild(card);

        lucide.createIcons();

        const statusEl =
            card.querySelector(".status");

        const textEl =
            statusEl.querySelector("span");

        const status =
            await checkStatus(link);

        if(status === "online"){

            online++;

            statusEl.className =
                "status online";

            textEl.textContent =
                "Working";

        }else{

            offline++;

            statusEl.className =
                "status offline";

            textEl.textContent =
                "Offline / Blocked";
        }

        document.getElementById("onlineCount")
            .innerText = online;

        document.getElementById("offlineCount")
            .innerText = offline;
    }
}

function copyLink(link){

    navigator.clipboard.writeText(link);

    alert("Copied link!");
}

document.getElementById("searchInput")
.addEventListener("input",e=>{

    const value =
        e.target.value.toLowerCase();

    document.querySelectorAll(".card")
    .forEach(card=>{

        const text =
            card.innerText.toLowerCase();

        card.style.display =
            text.includes(value)
            ? "block"
            : "none";
    });
});

(async()=>{

    await bootSequence();

    loadCards();

})();
</script>

</body>
</html>
